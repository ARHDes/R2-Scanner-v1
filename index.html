<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>線邊倉助手 V14.5</title>
    <!-- 引入外部庫 -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 800; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .suggestion-item { padding: 10px 14px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
        .suggestion-item:active { background: #eff6ff; }
        .admin-glow { box-shadow: 0 0 15px rgba(245, 158, 11, 0.3); border: 1px solid rgba(245, 158, 11, 0.5); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .unit-badge { display: inline-block; background: #f1f5f9; color: #334155; padding: 2px 8px; border-radius: 6px; font-size: 10px; margin-right: 4px; font-weight: 900; border: 1px solid #e2e8f0; }
        .clear-btn { opacity: 0; pointer-events: none; transition: all 0.2s; transform: scale(0.8); }
        .clear-btn.show { opacity: 1; pointer-events: auto; transform: scale(1); }
        #reader__scan_region { border-radius: 20px; overflow: hidden; }
        #reader__dashboard { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20 font-sans text-slate-900 text-left">

    <!-- A. 登錄頁面 -->
    <div id="setup-overlay" class="fixed inset-0 bg-blue-600 z-[1000] flex items-center justify-center p-6 hidden text-center">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl border-4 border-blue-400">
            <h2 class="text-2xl font-black mb-2 text-slate-800 tracking-tight">工號登錄</h2>
            <p class="text-slate-500 text-sm mb-6 font-medium text-center">請輸入員工編號以開始作業</p>
            <input type="text" id="operator-name-input" placeholder="請輸入工號" class="w-full border-2 border-slate-100 rounded-xl px-4 py-3 mb-4 outline-none focus:border-blue-500 text-center font-bold text-lg text-center">
            <button onclick="saveOperatorName()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg active:scale-95 transition-all text-center">確認進入系統</button>
        </div>
    </div>

    <!-- B. 導覽列 -->
    <nav id="top-nav" class="bg-white border-b border-slate-200 px-4 py-3 sticky top-0 z-50 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <div class="flex flex-col text-left">
                <span id="admin-badge" class="hidden text-[8px] font-black bg-amber-500 text-white px-1.5 py-0.5 rounded-full w-fit mb-0.5 uppercase tracking-tighter shadow-sm text-center">管理模式</span>
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter block leading-none mb-1">線邊倉助手</span>
                <span id="display-operator" class="text-sm font-bold text-slate-700 font-mono tracking-tight text-left leading-none">載入中...</span>
            </div>
        </div>
        <div class="flex items-center gap-1.5">
            <button id="admin-toggle-btn" onclick="toggleAdminMode()" class="hidden p-2 bg-amber-50 text-amber-600 rounded-lg border border-amber-100 active:scale-90 transition-transform"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg></button>
            <button onclick="toggleSettingsManager(true)" class="p-2 bg-slate-100 rounded-lg text-slate-600 active:scale-90 transition-transform"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg></button>
            <button onclick="logout()" class="p-2 bg-red-50 text-red-500 rounded-lg border border-red-100 active:scale-90 transition-transform"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg></button>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-4">
        <div class="flex bg-white rounded-xl p-1 shadow-sm border border-slate-100 text-center">
            <button onclick="switchTab('action')" id="tab-action" class="flex-1 py-2 text-sm font-bold tab-active transition-all">操作頁面</button>
            <button onclick="switchTab('stock')" id="tab-stock" class="flex-1 py-2 text-sm font-bold text-slate-400 transition-all">現存庫存</button>
            <button onclick="switchTab('history')" id="tab-history" class="flex-1 py-2 text-sm font-bold text-slate-400 transition-all">歷史紀錄</button>
        </div>

        <!-- C. 操作分頁 -->
        <div id="section-action" class="space-y-4 animate-in fade-in duration-300">
            <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 space-y-4 text-left">
                <div class="flex justify-between items-center px-1">
                    <div class="flex gap-2 p-1 bg-slate-50 rounded-xl flex-1 mr-4">
                        <button onclick="setMode('IN')" id="mode-in" class="flex-1 py-2 rounded-lg bg-blue-600 text-white font-bold text-xs shadow-md">入庫</button>
                        <button onclick="setMode('OUT')" id="mode-out" class="flex-1 py-2 rounded-lg text-slate-400 font-bold text-xs">出庫</button>
                        <button onclick="setMode('COUNT')" id="mode-count" class="flex-1 py-2 rounded-lg text-slate-400 font-bold text-xs">盤點</button>
                    </div>
                    <button onclick="resetActionFields()" class="text-blue-500 text-[10px] font-bold border-b border-blue-200 pb-0.5 active:text-blue-700">重設內容</button>
                </div>
                
                <div class="space-y-3 relative text-left">
                    <div class="grid grid-cols-2 gap-3 text-left">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">機群</label>
                            <select id="input-group" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 text-sm font-bold text-slate-800 outline-none focus:ring-2 focus:ring-blue-500 text-left"></select>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Unit名稱</label>
                            <input type="text" id="input-unit" placeholder="例如：PC" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 text-left">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 text-left">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">類別</label>
                            <select id="input-category" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 text-sm font-bold text-slate-800 outline-none focus:ring-2 focus:ring-blue-500 text-left"></select>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 text-left">位置 / 用途</label>
                            <input type="text" id="input-usage" placeholder="備註位置..." class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 text-left">
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">型號 (Model)</label>
                        <input type="text" id="input-model" placeholder="零件規格型號..." class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 font-mono text-left">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">料號 / 條碼</label>
                        <div class="flex gap-2">
                            <div class="relative flex-1">
                                <input type="text" id="input-sku" oninput="onSkuTyping(this.value)" placeholder="搜尋或掃描料號..." class="w-full bg-slate-50 border-0 rounded-xl pl-4 pr-10 py-3 text-sm outline-none focus:ring-2 focus:ring-blue-500 font-mono text-left" autocomplete="off">
                                <button id="btn-clear-sku" onclick="clearSkuInput()" class="clear-btn absolute right-3 top-1/2 -translate-y-1/2 text-slate-300 hover:text-slate-500 active:scale-90"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
                            </div>
                            <button onclick="startScanner()" class="bg-blue-100 text-blue-600 p-3 rounded-xl active:scale-90 transition-transform"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"></path></svg></button>
                        </div>
                        <div id="sku-suggestions" class="absolute left-0 right-0 bg-white border border-slate-200 rounded-xl shadow-xl z-50 mt-1 hidden max-h-60 overflow-y-auto hide-scroll text-left"></div>
                    </div>
                    <div class="space-y-1 text-center">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 text-left">異動數量</label>
                        <div class="flex items-center bg-slate-50 rounded-xl p-1 text-center">
                            <button onclick="stepQty(-1)" class="w-12 h-10 bg-white rounded-lg shadow-sm font-bold text-xl active:bg-slate-100">-</button>
                            <input type="number" id="input-qty" value="1" class="flex-1 bg-transparent text-center font-black text-xl outline-none text-center">
                            <button onclick="stepQty(1)" class="w-12 h-10 bg-white rounded-lg shadow-sm font-bold text-xl active:bg-slate-100">+</button>
                        </div>
                    </div>
                    <button id="btn-submit" onclick="submitTransaction()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-lg shadow-xl shadow-blue-100 active:scale-95 transition-all text-center">確認入庫</button>
                </div>
            </div>
        </div>

        <!-- D. 庫存分頁 -->
        <div id="section-stock" class="hidden space-y-4 animate-in fade-in duration-300">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 space-y-3 text-left">
                <div class="flex justify-between items-center px-1 text-left">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest font-black">條件篩選</span>
                    <div class="flex gap-3 items-center">
                        <button onclick="resetStockFilters()" class="text-orange-500 text-[10px] font-bold border-b border-orange-200 pb-0.5 active:text-orange-700">清除篩選</button>
                        <button onclick="openImportModal()" class="text-blue-600 text-[10px] font-bold border-b border-blue-200 pb-0.5">文字匯入</button>
                        <button onclick="exportAndShareStock()" class="text-emerald-600 text-[10px] font-bold border-b border-emerald-200 pb-0.5">匯出分享</button>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2 text-left text-xs">
                    <select id="filter-group" onchange="onFilterGroupChange()" class="bg-slate-50 border-0 rounded-lg px-3 py-2 font-bold outline-none focus:ring-1 focus:ring-blue-500 shadow-inner font-mono text-left"></select>
                    <select id="filter-unit" onchange="onFilterUnitChange()" class="bg-slate-50 border-0 rounded-lg px-3 py-2 font-bold outline-none focus:ring-1 focus:ring-blue-500 shadow-inner font-mono text-left"></select>
                </div>
                <div class="grid grid-cols-1 text-xs text-left">
                    <select id="filter-category" onchange="applyFilters()" class="w-full bg-slate-50 border-0 rounded-lg px-3 py-2.5 font-bold outline-none focus:ring-1 focus:ring-blue-500 shadow-inner text-left"></select>
                </div>
                <div class="relative">
                    <input type="text" id="filter-usage" oninput="toggleSearchClearBtn(this.value); applyFilters();" placeholder="搜尋型號、料號、位置關鍵字..." class="w-full bg-slate-50 border-0 rounded-lg pl-3 pr-10 py-2.5 text-xs font-bold outline-none focus:ring-1 focus:ring-blue-500 shadow-inner text-left">
                    <button id="btn-clear-search" onclick="clearSearchInput()" class="clear-btn absolute right-3 top-1/2 -translate-y-1/2 text-slate-300 hover:text-slate-500 active:scale-90 text-center"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
                </div>
            </div>
            <div id="stock-list" class="space-y-2 text-left"></div>
        </div>

        <div id="section-history" class="hidden space-y-3 animate-in fade-in duration-300 text-left"><div id="history-list" class="space-y-2 text-left text-left"></div></div>
    </main>

    <!-- F. 彈窗管理 -->
    <div id="comment-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[4800] hidden flex items-center justify-center p-6 text-center" onclick="closeCommentModal()">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 space-y-4 shadow-2xl animate-in fade-in slide-in-from-bottom-4 duration-200 text-left text-left" onclick="event.stopPropagation()">
            <div class="text-center font-black"><h3 class="text-lg text-slate-800 tracking-tight text-center">紀錄備註 (Comment)</h3><p class="text-[10px] text-slate-400 mt-1">選填內容，將同步儲存</p></div>
            <textarea id="transaction-comment" placeholder="輸入異動原因..." class="w-full h-24 bg-slate-50 border border-slate-200 rounded-2xl p-3 text-sm outline-none focus:border-blue-500 text-left"></textarea>
            <div class="flex gap-3 text-center"><button onclick="closeCommentModal()" class="flex-1 py-3 bg-slate-100 rounded-xl font-bold text-slate-500 text-sm active:bg-slate-200 transition-colors">取消</button><button onclick="confirmTransactionWithComment()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold text-sm shadow-lg active:scale-95 transition-all text-center">確認送出</button></div>
        </div>
    </div>

    <!-- 關鍵修復：機台用途選取彈窗 -->
    <div id="context-picker-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[4500] hidden flex items-center justify-center p-6 text-center" onclick="closeContextPicker()">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 space-y-4 shadow-2xl animate-in fade-in zoom-in duration-200 text-left text-left" onclick="event.stopPropagation()">
            <div class="text-center font-black"><h3 id="picker-title" class="text-lg text-slate-800 tracking-tight text-center">機台用途選取</h3><p id="picker-desc" class="text-[10px] text-slate-400 mt-1 text-center">此為共用料號請選取機台用途</p></div>
            <div id="context-options-list" class="space-y-2 max-h-64 overflow-y-auto pr-1 hide-scroll font-sans text-left"></div>
            <div id="admin-full-delete-zone" class="hidden pt-2 border-t border-slate-100 text-center"><button onclick="executeFullDeleteFromPicker()" class="w-full py-3 bg-red-50 text-red-600 rounded-xl font-bold text-xs active:bg-red-100 transition-colors">永久徹底刪除整個料號</button></div>
            <button onclick="closeContextPicker()" class="w-full py-3 bg-slate-100 rounded-xl font-bold text-slate-500 text-sm active:bg-slate-200 transition-colors text-center">取消</button>
        </div>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-center justify-center p-6 text-left" onclick="toggleSettingsManager(false)">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 space-y-6 shadow-2xl text-left font-sans" onclick="event.stopPropagation()">
            <div class="space-y-3 text-left">
                <h3 class="text-sm font-black border-l-4 border-blue-500 pl-2 text-slate-800 uppercase tracking-widest text-left">類別管理</h3>
                <div id="admin-cat-controls" class="hidden flex gap-2 text-left"><input type="text" id="new-category-name" placeholder="新類別..." class="flex-1 bg-slate-50 rounded-xl px-3 py-2 text-sm outline-none text-left"><button onclick="addNewCategory()" class="bg-blue-600 text-white px-4 rounded-xl font-bold active:scale-90 text-center">+</button></div>
                <div id="category-list-manager" class="space-y-1.5 max-h-32 overflow-y-auto pr-1 hide-scroll font-mono text-left"></div>
            </div>
            <div class="space-y-3 text-left">
                <h3 class="text-sm font-black border-l-4 border-amber-500 pl-2 text-slate-800 uppercase tracking-widest text-left">機群管理</h3>
                <div id="admin-group-controls" class="hidden flex gap-2 text-left"><input type="text" id="new-group-name" placeholder="新機群..." class="flex-1 bg-slate-50 rounded-xl px-3 py-2 text-sm outline-none text-left"><button onclick="addNewGroup()" class="bg-amber-500 text-white px-4 rounded-xl font-bold active:scale-90 text-center">+</button></div>
                <div id="group-list-manager" class="space-y-1.5 max-h-32 overflow-y-auto pr-1 hide-scroll font-mono text-left"></div>
            </div>
            <button onclick="toggleSettingsManager(false)" class="w-full py-3 bg-slate-100 rounded-xl font-bold text-slate-500 text-sm active:bg-slate-200 transition-colors text-center">關閉設定</button>
        </div>
    </div>

    <div id="scanner-view" class="fixed inset-0 bg-black z-[6000] hidden flex flex-col text-left">
        <div class="bg-black/60 p-6 flex justify-between items-center text-white">
            <div class="font-black tracking-tight text-left">條碼掃描</div>
            <button onclick="stopScanner()" class="bg-white/10 p-2 rounded-full active:bg-white/20 text-center"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        </div>
        <div id="reader" class="flex-1 bg-black"></div>
        <div class="p-10 bg-black/80 text-center text-center">
            <p class="text-white/40 text-[10px] font-bold mb-4 uppercase tracking-widest text-center text-center">長形條碼請置於框內</p>
            <button onclick="stopScanner()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-black active:scale-95 transition-transform text-center text-center">關閉相機</button>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 text-white px-6 py-3 rounded-full text-[12px] font-black opacity-0 transition-all z-[9000] pointer-events-none shadow-2xl flex items-center gap-2 text-center text-center"></div>

    <!-- G. Firebase 與核心邏輯 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, serverTimestamp, getDoc, writeBatch, deleteDoc, runTransaction } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDlrIJR7wKN_lzcTiC2ohe8jeXaC3mZXdk", authDomain: "storage-3098e.firebaseapp.com", projectId: "storage-3098e", storageBucket: "storage-3098e.firebasestorage.app", messagingSenderId: "947569272384", appId: "1:947569272384:web:badb6b78e91e36cee5a1a5", measurementId: "G-1WEQXLGR20" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'shared-ims-storage-3098e'; 
        const ADMIN_ID = 'Admin'; 

        let operatorId = localStorage.getItem('ims_op_v12_final'); 
        let currentMode = 'IN';
        let adminModeActive = false;
        let categories = [];
        let machineGroups = [];
        let html5QrCode = null;
        let pendingTransaction = null;
        let activePickerSku = null;

        async function init() {
            if (!operatorId) document.getElementById('setup-overlay').classList.remove('hidden');
            else { document.getElementById('display-operator').innerText = `👤 工號: ${operatorId}`; checkAdminStatus(); }
            try { await signInAnonymously(auth); onAuthStateChanged(auth, (u) => { if (u) loadCloudData(); }); } catch (err) { console.error(err); }
        }

        function checkAdminStatus() { if (operatorId === ADMIN_ID) { document.getElementById('admin-toggle-btn').classList.remove('hidden'); document.getElementById('display-operator').classList.add('text-amber-600'); } }
        window.saveOperatorName = () => { const id = document.getElementById('operator-name-input').value.trim(); if (!id) return; localStorage.setItem('ims_op_v12_final', id); location.reload(); };
        window.logout = () => { if (confirm("確定要登出並換人嗎？")) { localStorage.removeItem('ims_op_v12_final'); location.reload(); } };
        window.toggleAdminMode = () => { adminModeActive = !adminModeActive; const nav = document.getElementById('top-nav'); nav.classList.toggle('admin-glow', adminModeActive); nav.classList.toggle('bg-amber-50', adminModeActive); document.getElementById('admin-badge').classList.toggle('hidden', !adminModeActive); renderStock(window.cachedStock || []); renderHistory(window.cachedHistory || []); renderCats(); renderGroups(); };

        function loadCloudData() {
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'categories', 'all'), (s) => { categories = s.exists() ? s.data().list : ['培林', '氣壓缸']; renderCats(); });
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'groups', 'all'), (s) => { machineGroups = s.exists() ? s.data().list : ['CSCR', 'CST', 'CV']; renderGroups(); });
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'stock'), (s) => {
                const data = s.docs.map(d => d.data());
                window.cachedStock = data;
                refreshInitialFilters(); 
                applyFilters();
            }, (err) => showToast("讀取庫存失敗", false));
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'history'), (s) => { const logs = s.docs.map(d => ({ ...d.data(), id: d.id })).sort((a,b) => (b.timestamp?.toMillis() || 0) - (a.timestamp?.toMillis() || 0)); window.cachedHistory = logs; renderHistory(logs); });
        }

        // --- H. 核心修復：共用料號判定與彈窗 (V14.5) ---
        window.autoFillStock = (sku) => {
            const item = window.cachedStock.find(i => i.sku === sku);
            if (!item) return;

            // 修正分割邏輯：統一按逗號分割並過濾空字串
            const groups = (item.group || "").split(",").map(s => s.trim()).filter(Boolean);
            const units = (item.unit || "").split(",").map(s => s.trim()).filter(Boolean);

        window.processPastedText = async () => { /* 這裡保持 V13.9 徹底修復過的匯入代碼 */ const input = document.getElementById('import-text-area'); const text = input.value.trim(); if (!text) return showToast("⚠️ 請貼入內容", false); const rows = text.split(/\r?\n/).filter(r => r.trim() !== ""); const batch = writeBatch(db); const map = new Map(); try { let start = (rows[0].includes("機群") || rows[0].includes("料號")) ? 1 : 0; for (let i = start; i < rows.length; i++) { const c = rows[i].split(",").map(s => s.trim()); if (c.length < 5) continue; const [g, u, cat, us, sku, qtyS, model] = c; if (!sku) continue; if (!map.has(sku)) map.set(sku, { groups: new Set([g]), units: new Set([u]), usages: new Set([us||""]), category: cat, qty: parseInt(qtyS)||0, model: model||"" }); else { const m = map.get(sku); m.groups.add(g); m.units.add(u); m.usages.add(us||""); m.qty = parseInt(qtyS)||0; if(model) m.model = model; } } for (const [sku, inp] of map) { const cloud = window.cachedStock.find(it => it.sku === sku); let fG, fU, fUs; if (cloud) { const gS = new Set(cloud.group.split(",").map(s => s.trim())); const uS = new Set(cloud.unit.split(",").map(s => s.trim())); const usS = new Set((cloud.usage || "").split(",").map(s => s.trim())); inp.groups.forEach(v => gS.add(v)); inp.units.forEach(v => uS.add(v)); inp.usages.forEach(v => usS.add(v)); fG = Array.from(gS).filter(Boolean).join(", "); fU = Array.from(uS).filter(Boolean).join(", "); fUs = Array.from(usS).filter(Boolean).join(", "); } else { fG = Array.from(inp.groups).join(", "); fU = Array.from(inp.units).join(", "); fUs = Array.from(inp.usages).join(", "); } batch.set(doc(db, 'artifacts', appId, 'public', 'data', 'stock', sku), { sku, group: fG, unit: fU, category: inp.category||"其他", usage: fUs, qty: inp.qty, model: inp.model, lastOp: operatorId+"(匯入)", time: serverTimestamp() }); } await batch.commit(); showToast("✅ 匯入成功", true); input.value = ""; closeImportModal(); } catch (e) { showToast("❌ 錯誤", false); } };

        window.resetActionFields = () => { document.getElementById('input-sku').value = ""; document.getElementById('input-model').value = ""; document.getElementById('input-unit').value = ""; document.getElementById('input-usage').value = ""; document.getElementById('input-qty').value = "1"; document.getElementById('input-group').selectedIndex = 0; document.getElementById('input-category').selectedIndex = 0; document.getElementById('btn-clear-sku').classList.remove('show'); document.getElementById('sku-suggestions').classList.add('hidden'); };
        window.resetStockFilters = () => { document.getElementById('filter-group').selectedIndex = 0; updateUnitDropdown(); document.getElementById('filter-unit').selectedIndex = 0; updateCategoryDropdown(); document.getElementById('filter-category').selectedIndex = 0; document.getElementById('filter-usage').value = ""; document.getElementById('btn-clear-search').classList.remove('show'); applyFilters(); };
        window.onSkuTyping = (v) => { document.getElementById('btn-clear-sku').classList.toggle('show', v.length > 0); const c = document.getElementById('sku-suggestions'); if (!v || !window.cachedStock) { c.classList.add('hidden'); return; } const m = window.cachedStock.filter(i => i.sku.toLowerCase().includes(v.toLowerCase())).slice(0, 8); if (m.length > 0) { c.innerHTML = m.map(i => `<div class="suggestion-item text-left"><div class="font-bold text-xs font-mono">${i.sku}</div><div class="text-[8px] text-slate-400 font-mono">型號：${i.model||'無'} | 數量：${i.qty}</div></div>`).join(''); c.classList.remove('hidden'); } else c.classList.add('hidden'); };
        function switchTab(t) { ['action','stock','history'].forEach(x => { document.getElementById(`section-${x}`).classList.toggle('hidden', x !== t); document.getElementById(`tab-${x}`).classList.toggle('tab-active', x === t); }); }
        function stepQty(v) { const i = document.getElementById('input-qty'); i.value = Math.max(0, (parseInt(i.value) || 0) + v); }
        function setMode(m) { currentMode = m; ['IN','OUT','COUNT'].forEach(x => document.getElementById(`mode-${x.toLowerCase()}`).className = x === m ? 'flex-1 py-2 rounded-lg bg-blue-600 text-white font-bold text-xs shadow-md' : 'flex-1 py-2 rounded-lg text-slate-400 font-bold text-xs'); const btn = document.getElementById('btn-submit'); btn.innerText = m==='IN'?'確認入庫':(m==='OUT'?'確認出庫':'修正盤點'); btn.style.backgroundColor = m==='IN'?'#2563eb':(m==='OUT'?'#f97316':'#10b981'); }
        document.addEventListener('click', (e) => { if (e.target.id !== 'input-sku') document.getElementById('sku-suggestions').classList.add('hidden'); });
        init();
    </script>
</body>
</html>
