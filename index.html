<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>線邊倉助手</title>
    <!-- 引入外部庫 -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 800; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .suggestion-item { padding: 10px 14px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
        .suggestion-item:active { background: #eff6ff; }
        .admin-glow { box-shadow: 0 0 15px rgba(245, 158, 11, 0.3); border: 1px solid rgba(245, 158, 11, 0.5); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .unit-badge { display: inline-block; background: #f1f5f9; color: #334155; padding: 2px 8px; border-radius: 6px; font-size: 10px; margin-right: 4px; font-weight: 900; letter-spacing: -0.2px; border: 1px solid #e2e8f0; }
        .clear-btn { opacity: 0; pointer-events: none; transition: all 0.2s; transform: scale(0.8); }
        .clear-btn.show { opacity: 1; pointer-events: auto; transform: scale(1); }
        #reader__scan_region { border-radius: 20px; overflow: hidden; }
        #reader__dashboard { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20 font-sans text-slate-900 text-left">

    <!-- 登錄頁面 -->
    <div id="setup-overlay" class="fixed inset-0 bg-blue-600 z-[1000] flex items-center justify-center p-6 hidden text-center">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl border-4 border-blue-400">
            <h2 class="text-2xl font-black mb-2 text-slate-800 tracking-tight text-center">工號登錄</h2>
            <p class="text-slate-500 text-sm mb-6 font-medium text-center">請輸入員工編號以開始作業</p>
            <input type="text" id="operator-name-input" placeholder="請輸入工號" class="w-full border-2 border-slate-100 rounded-xl px-4 py-3 mb-4 outline-none focus:border-blue-500 text-center font-bold text-lg text-center">
            <button onclick="saveOperatorName()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg active:scale-95 transition-all text-center">確認進入系統</button>
        </div>
    </div>

    <!-- 導覽列 -->
    <nav id="top-nav" class="bg-white border-b border-slate-200 px-4 py-3 sticky top-0 z-50 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <div class="flex flex-col text-left">
                <span id="admin-badge" class="hidden text-[8px] font-black bg-amber-500 text-white px-1.5 py-0.5 rounded-full w-fit mb-0.5 uppercase tracking-tighter shadow-sm text-center">管理模式</span>
                <span id="display-operator" class="text-sm font-bold text-slate-700 font-mono tracking-tight text-left">載入中...</span>
            </div>
        </div>
        <div class="flex items-center gap-1.5 text-center">
            <button id="admin-toggle-btn" onclick="toggleAdminMode()" class="hidden p-2 bg-amber-50 text-amber-600 rounded-lg border border-amber-100 active:scale-90 transition-transform"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg></button>
            <button onclick="toggleSettingsManager(true)" class="p-2 bg-slate-100 rounded-lg text-slate-600 active:scale-90 transition-transform"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg></button>
            <button onclick="logout()" class="p-2 bg-red-50 text-red-500 rounded-lg border border-red-100 active:scale-90 transition-transform"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg></button>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-4">
        <div class="flex bg-white rounded-xl p-1 shadow-sm border border-slate-100 text-center text-center">
            <button onclick="switchTab('action')" id="tab-action" class="flex-1 py-2 text-sm font-bold tab-active transition-all">操作頁面</button>
            <button onclick="switchTab('stock')" id="tab-stock" class="flex-1 py-2 text-sm font-bold text-slate-400 transition-all">現存庫存</button>
            <button onclick="switchTab('history')" id="tab-history" class="flex-1 py-2 text-sm font-bold text-slate-400 transition-all">歷史紀錄</button>
        </div>

        <!-- 操作頁面 -->
        <div id="section-action" class="space-y-4 animate-in fade-in duration-300">
            <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 space-y-4 text-left">
                <div class="flex justify-between items-center px-1">
                    <div class="flex gap-2 p-1 bg-slate-50 rounded-xl flex-1 mr-4">
                        <button onclick="setMode('IN')" id="mode-in" class="flex-1 py-2 rounded-lg bg-blue-600 text-white font-bold text-xs shadow-md">入庫</button>
                        <button onclick="setMode('OUT')" id="mode-out" class="flex-1 py-2 rounded-lg text-slate-400 font-bold text-xs">出庫</button>
                        <button onclick="setMode('COUNT')" id="mode-count" class="flex-1 py-2 rounded-lg text-slate-400 font-bold text-xs">盤點</button>
                    </div>
                </div>
                
                <div class="space-y-3 relative text-left">
                    <div class="grid grid-cols-2 gap-3 text-left">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">機群</label>
                            <select id="input-group" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 text-sm font-bold text-slate-800 outline-none focus:ring-2 focus:ring-blue-500 text-left"></select>
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 text-left">Unit名稱</label>
                            <input type="text" id="input-unit" placeholder="例如：PC" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 text-left">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 text-left">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 text-left">類別</label>
                            <select id="input-category" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 text-sm font-bold text-slate-800 outline-none focus:ring-2 focus:ring-blue-500 text-left"></select>
                        </div>
                        <div class="space-y-1 text-left">
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 text-left">位置 / 用途</label>
                            <input type="text" id="input-usage" placeholder="備註位置..." class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 text-left">
                        </div>
                    </div>
                    <div class="space-y-1 text-left">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">型號 (Model)</label>
                        <input type="text" id="input-model" placeholder="零件規格型號..." class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 font-mono text-left">
                    </div>
                    <div class="space-y-1 text-left text-left">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 text-left">料號 / 條碼</label>
                        <div class="flex gap-2">
                            <div class="relative flex-1">
                                <input type="text" id="input-sku" oninput="onSkuTyping(this.value)" placeholder="搜尋或掃描料號..." class="w-full bg-slate-50 border-0 rounded-xl pl-4 pr-10 py-3 text-sm outline-none focus:ring-2 focus:ring-blue-500 font-mono text-left text-left" autocomplete="off">
                                <button id="btn-clear-sku" onclick="clearSkuInput()" class="clear-btn absolute right-3 top-1/2 -translate-y-1/2 text-slate-300 hover:text-slate-500 active:scale-90 text-center"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
                            </div>
                            <button onclick="startScanner()" class="bg-blue-100 text-blue-600 p-3 rounded-xl active:scale-90 transition-transform text-center"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"></path></svg></button>
                        </div>
                        <div id="sku-suggestions" class="absolute left-0 right-0 bg-white border border-slate-200 rounded-xl shadow-xl z-50 mt-1 hidden max-h-60 overflow-y-auto hide-scroll text-left"></div>
                    </div>
                    <div class="space-y-1 text-center">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 text-left text-left text-left">異動數量</label>
                        <div class="flex items-center bg-slate-50 rounded-xl p-1 text-center text-center text-center">
                            <button onclick="stepQty(-1)" class="w-12 h-10 bg-white rounded-lg shadow-sm font-bold text-xl active:bg-slate-100">-</button>
                            <input type="number" id="input-qty" value="1" class="flex-1 bg-transparent text-center font-black text-xl outline-none text-center">
                            <button onclick="stepQty(1)" class="w-12 h-10 bg-white rounded-lg shadow-sm font-bold text-xl active:bg-slate-100">+</button>
                        </div>
                    </div>
                    <button id="btn-submit" onclick="submitTransaction()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-lg shadow-xl shadow-blue-100 active:scale-95 transition-all text-center">確認入庫</button>
                </div>
            </div>
        </div>

        <!-- 庫存分頁 -->
        <div id="section-stock" class="hidden space-y-4 animate-in fade-in duration-300">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 space-y-3 text-left">
                <div class="flex justify-between items-center px-1 text-left">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest font-black">條件篩選</span>
                    <button onclick="openImportModal()" class="text-blue-600 text-[10px] font-bold border-b border-blue-200 pb-0.5">文字匯入</button>
                </div>
                <div class="grid grid-cols-2 gap-2 text-left text-xs">
                    <select id="filter-group" onchange="onFilterGroupChange()" class="bg-slate-50 border-0 rounded-lg px-3 py-2 font-bold outline-none focus:ring-1 focus:ring-blue-500 shadow-inner font-mono text-left"></select>
                    <select id="filter-unit" onchange="onFilterUnitChange()" class="bg-slate-50 border-0 rounded-lg px-3 py-2 font-bold outline-none focus:ring-1 focus:ring-blue-500 shadow-inner font-mono text-left"></select>
                </div>
                <div class="grid grid-cols-1 text-xs text-left">
                    <select id="filter-category" onchange="applyFilters()" class="w-full bg-slate-50 border-0 rounded-lg px-3 py-2.5 font-bold outline-none focus:ring-1 focus:ring-blue-500 shadow-inner text-left"></select>
                </div>
                <div class="relative">
                    <input type="text" id="filter-usage" oninput="applyFilters()" placeholder="搜尋關鍵字..." class="w-full bg-slate-50 border-0 rounded-lg pl-3 pr-10 py-2.5 text-xs font-bold outline-none focus:ring-1 focus:ring-blue-500 shadow-inner text-left text-left">
                </div>
            </div>
            <div id="stock-list" class="space-y-2 text-left"></div>
        </div>

        <!-- 歷史紀錄 -->
        <div id="section-history" class="hidden space-y-3 animate-in fade-in duration-300 text-left text-left"><div id="history-list" class="space-y-2 text-left text-left"></div></div>
    </main>

    <!-- 彈窗群 -->
    <div id="comment-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[4800] hidden flex items-center justify-center p-6 text-center text-center text-center" onclick="closeCommentModal()">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 space-y-4 shadow-2xl animate-in fade-in slide-in-from-bottom-4 duration-200 text-left" onclick="event.stopPropagation()">
            <div class="text-center font-black text-center text-center"><h3 class="text-lg text-slate-800 tracking-tight text-center">紀錄備註 (Comment)</h3><p class="text-[10px] text-slate-400 mt-1">選填，將顯示於歷史日誌中</p></div>
            <textarea id="transaction-comment" placeholder="異動原因..." class="w-full h-24 bg-slate-50 border border-slate-200 rounded-2xl p-3 text-sm outline-none focus:border-blue-500 text-left"></textarea>
            <div class="flex gap-3 text-center text-center"><button onclick="closeCommentModal()" class="flex-1 py-3 bg-slate-100 rounded-xl font-bold text-slate-500 text-sm active:bg-slate-200 transition-colors text-center text-center text-center">取消</button><button onclick="confirmTransactionWithComment()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold text-sm shadow-lg active:scale-95 transition-all text-center">確認送出</button></div>
        </div>
    </div>

    <div id="context-picker-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[4500] hidden flex items-center justify-center p-6 text-center text-center text-center" onclick="closeContextPicker()">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 space-y-4 shadow-2xl animate-in fade-in zoom-in duration-200 text-left text-left" onclick="event.stopPropagation()">
            <div class="text-center font-black text-center text-center"><h3 id="picker-title" class="text-lg text-slate-800 tracking-tight text-center text-center text-center text-center">機台用途選取</h3><p id="picker-desc" class="text-[10px] text-slate-400 mt-1 text-center text-center text-center text-center">請選取欲操作的組合：</p></div>
            <div id="context-options-list" class="space-y-2 max-h-64 overflow-y-auto pr-1 hide-scroll font-sans text-left text-left"></div>
            <div id="admin-full-delete-zone" class="hidden pt-2 border-t border-slate-100 text-center text-center text-center text-center"><button onclick="executeFullDeleteFromPicker()" class="w-full py-3 bg-red-50 text-red-600 rounded-xl font-bold text-xs active:bg-red-100 transition-colors text-center text-center">永久徹底刪除整個料號</button></div>
            <button onclick="closeContextPicker()" class="w-full py-3 bg-slate-100 rounded-xl font-bold text-slate-500 text-sm active:bg-slate-200 transition-colors text-center text-center text-center text-center text-center">取消</button>
        </div>
    </div>

    <!-- Firebase 邏輯 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, serverTimestamp, getDoc, writeBatch, deleteDoc, runTransaction } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDlrIJR7wKN_lzcTiC2ohe8jeXaC3mZXdk", authDomain: "storage-3098e.firebaseapp.com", projectId: "storage-3098e", storageBucket: "storage-3098e.firebasestorage.app", messagingSenderId: "947569272384", appId: "1:947569272384:web:badb6b78e91e36cee5a1a5", measurementId: "G-1WEQXLGR20" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'shared-ims-storage-3098e'; 
        const ADMIN_ID = 'Admin'; 

        let operatorId = localStorage.getItem('ims_op_v13_4'); 
        let currentMode = 'IN';
        let adminModeActive = false;
        let categories = [];
        let machineGroups = [];
        let html5QrCode = null;
        let pendingTransaction = null;
        let activePickerSku = null;

        async function init() {
            if (!operatorId) document.getElementById('setup-overlay').classList.remove('hidden');
            else { document.getElementById('display-operator').innerText = `👤 工號: ${operatorId}`; checkAdminStatus(); }
            try { await signInAnonymously(auth); onAuthStateChanged(auth, (u) => { if (u) loadCloudData(); }); } catch (err) { console.error(err); }
        }

        function checkAdminStatus() {
            if (operatorId === ADMIN_ID) {
                document.getElementById('admin-toggle-btn').classList.remove('hidden');
                document.getElementById('display-operator').classList.add('text-amber-600');
            }
        }

        function loadCloudData() {
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'categories', 'all'), (s) => { 
                categories = s.exists() ? s.data().list : ['培林', '氣壓缸']; renderCats(); 
            });
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'groups', 'all'), (s) => { 
                machineGroups = s.exists() ? s.data().list : ['CSCR', 'CST', 'CV']; renderGroups(); 
            });
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'stock'), (s) => {
                const data = s.docs.map(d => d.data());
                window.cachedStock = data;
                refreshInitialFilters(); applyFilters();
            });
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'history'), (s) => {
                const logs = s.docs.map(d => ({ ...d.data(), id: d.id })).sort((a,b) => (b.timestamp?.toMillis() || 0) - (a.timestamp?.toMillis() || 0));
                window.cachedHistory = logs;
                renderHistory(logs);
            });
        }

        // --- 彈窗修復與全域宣告 (V14.7) ---
        window.closeContextPicker = () => document.getElementById('context-picker-modal').classList.add('hidden');
        window.closeCommentModal = () => document.getElementById('comment-modal').classList.add('hidden');
        window.closeConfirmModal = () => document.getElementById('confirm-modal').classList.add('hidden');
        window.toggleSettingsManager = (s) => document.getElementById('settings-modal').classList.toggle('hidden', !s);
        window.openImportModal = () => document.getElementById('import-modal').classList.remove('hidden');
        window.closeImportModal = () => document.getElementById('import-modal').classList.add('hidden');

        // --- 核心邏輯 ---
        window.autoFillStock = (sku) => {
            const it = window.cachedStock.find(i => i.sku === sku); if (!it) return;
            const gL = (it.group||"").split(",").map(s=>s.trim()).filter(Boolean);
            const uL = (it.unit||"").split(",").map(s=>s.trim()).filter(Boolean);
            const usL = (it.usage||"").split(",").map(s=>s.trim());
            if (Math.max(gL.length, uL.length, usL.length) > 1) showContextPicker(it, gL, uL, usL, false);
            else applyContext(it.sku, gL[0]||"", uL[0]||"", it.category, usL[0]||"", it.model||"");
        };

        function showContextPicker(item, groups, units, usages, isDeleteMode = false) {
            activePickerSku = item.sku; const list = document.getElementById('context-options-list'); list.innerHTML = "";
            document.getElementById('picker-title').innerText = isDeleteMode ? "選擇要移除的環境" : "機台用途選取";
            document.getElementById('admin-full-delete-zone').classList.toggle('hidden', !isDeleteMode);
            for (let i = 0; i < Math.max(groups.length, units.length, usages.length); i++) {
                const g = groups[i] || groups[0] || ""; const u = units[i] || units[0] || ""; const us = (usages && usages[i] !== undefined) ? usages[i] : (usages[0] || "");
                const btn = document.createElement('button'); btn.className = `w-full p-4 border rounded-2xl text-left mb-2 active:scale-95 transition-transform ${isDeleteMode ? 'bg-red-50 border-red-100' : 'bg-slate-50 border-slate-200'}`;
                btn.innerHTML = `<div class="flex justify-between items-center text-[10px]"><div><span class="font-black ${isDeleteMode ? 'text-red-600' : 'text-blue-600'} uppercase font-mono tracking-tight text-left">${g}_${u}</span><div class="text-slate-800 font-black mt-1.5 text-xs text-left">位：${us || '未註明'}</div></div><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="${isDeleteMode ? 'M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6' : 'M5 12h14M12 5l7 7-7 7'}"/></svg></div>`;
                btn.onclick = () => isDeleteMode ? executePartialDelete(item.sku, i) : (applyContext(item.sku, g, u, item.category, us, item.model || ""), window.closeContextPicker());
                list.appendChild(btn);
            }
            document.getElementById('context-picker-modal').classList.remove('hidden');
        }

        function applyContext(sku, g, u, cat, usage, model) {
            document.getElementById('input-sku').value = sku;
            document.getElementById('input-model').value = model || "";
            document.getElementById('input-group').value = machineGroups.includes(g) ? g : "";
            document.getElementById('input-unit').value = u || "";
            document.getElementById('input-category').value = cat || "";
            document.getElementById('input-usage').value = usage || "";
            switchTab('action'); showToast(`已帶入版本：${g}_${u}`, true);
        }

        // --- 管理回退 ---
        window.deleteHistoryItem = async (id, data) => {
            if (!adminModeActive) return;
            if (!confirm(`確定回退庫存並刪除？`)) return;
            try {
                await runTransaction(db, async (tx) => {
                    const sRef = doc(db, 'artifacts', appId, 'public', 'data', 'stock', data.sku);
                    const sSnap = await tx.get(sRef);
                    const cur = parseInt(sSnap.data().qty) || 0;
                    let rb = cur;
                    if (data.type === 'IN') rb = cur - data.change;
                    else if (data.type === 'OUT') rb = cur + data.change;
                    else rb = cur - (data.diff || 0);
                    tx.delete(doc(db, 'artifacts', appId, 'public', 'data', 'history', id));
                    tx.update(sRef, { qty: rb, lastOp: `${operatorId}(Rb)` });
                });
                showToast("🗑️ 紀錄已回退", true);
            } catch (e) { showToast("失敗", false); }
        };

        // --- 其他工具 ---
        window.saveOperatorName = () => { const id = document.getElementById('operator-name-input').value.trim(); if (!id) return; localStorage.setItem('ims_op_v13_4', id); location.reload(); };
        window.logout = () => { if (confirm("確定要登出並換人嗎？")) { localStorage.removeItem('ims_op_v13_4'); location.reload(); } };
        window.toggleAdminMode = () => { adminModeActive = !adminModeActive; const nav = document.getElementById('top-nav'); nav.classList.toggle('admin-glow', adminModeActive); nav.classList.toggle('bg-amber-50', adminModeActive); document.getElementById('admin-badge').classList.toggle('hidden', !adminModeActive); renderStock(window.cachedStock || []); renderHistory(window.cachedHistory || []); };
        window.stepQty = (v) => { const i = document.getElementById('input-qty'); i.value = Math.max(0, (parseInt(i.value) || 0) + v); };
        window.setMode = (m) => { currentMode = m; ['IN','OUT','COUNT'].forEach(x => document.getElementById(`mode-${x.toLowerCase()}`).className = x === m ? 'flex-1 py-2 rounded-lg bg-blue-600 text-white font-bold text-xs shadow-md' : 'flex-1 py-2 rounded-lg text-slate-400 font-bold text-xs'); const btn = document.getElementById('btn-submit'); btn.innerText = m==='IN'?'確認入庫':(m==='OUT'?'確認出庫':'修正盤點'); btn.style.backgroundColor = m==='IN'?'#2563eb':(m==='OUT'?'#f97316':'#10b981'); };
        window.switchTab = (t) => { ['action','stock','history'].forEach(x => { document.getElementById(`section-${x}`).classList.toggle('hidden', x !== t); document.getElementById(`tab-${x}`).classList.toggle('tab-active', x === t); }); };
        window.clearSkuInput = () => { const i = document.getElementById('input-sku'); i.value = ""; document.getElementById('sku-suggestions').classList.add('hidden'); i.focus(); };
        function showToast(m, s = true) { const t = document.getElementById('toast'); t.className = `fixed bottom-10 left-1/2 -translate-x-1/2 text-white px-6 py-3 rounded-full text-[12px] font-black opacity-0 transition-all z-[9000] shadow-2xl flex items-center gap-2 ${s ? 'bg-emerald-600' : 'bg-red-600'}`; t.innerHTML = `<span>${m}</span>`; t.style.opacity = "1"; setTimeout(() => t.style.opacity = "0", 3000); }
        
        window.onSkuTyping = (v) => { const c = document.getElementById('sku-suggestions'); if (!v || !window.cachedStock) { c.classList.add('hidden'); return; } const m = window.cachedStock.filter(i => i.sku.toLowerCase().includes(v.toLowerCase())).slice(0, 8); if (m.length > 0) { c.innerHTML = m.map(i => `<div class="suggestion-item text-left"><div class="font-bold text-xs font-mono">${i.sku}</div><div class="text-[8px] text-slate-400 font-mono">型號：${i.model||'無'} | 數量：${i.qty}</div></div>`).join(''); c.classList.remove('hidden'); } else c.classList.add('hidden'); };
        window.submitTransaction = async () => { /* 提交邏輯 */ const sku = document.getElementById('input-sku').value.trim(); const group = document.getElementById('input-group').value; const unit = document.getElementById('input-unit').value.trim(); const cat = document.getElementById('input-category').value; if (!sku || !group || !unit || !cat) return showToast("⚠️ 請完整填寫表單", false); openCommentModal(sku, group, unit, cat, document.getElementById('input-usage').value.trim(), parseInt(document.getElementById('input-qty').value)||0, document.getElementById('input-model').value.trim(), null); };
        window.confirmTransactionWithComment = () => { const cmt = document.getElementById('transaction-comment').value.trim(); window.closeCommentModal(); executeCommit(pendingTransaction.sku, pendingTransaction.group, pendingTransaction.unit, pendingTransaction.cat, pendingTransaction.usage, pendingTransaction.qty, pendingTransaction.model, cmt); };
        async function executeCommit(sku, group, unit, cat, usage, qty, model, comment) { const btn = document.getElementById('btn-submit'); btn.disabled = true; try { const ref = doc(db, 'artifacts', appId, 'public', 'data', 'stock', sku); const snap = await getDoc(ref); const old = snap.exists() ? (parseInt(snap.data().qty) || 0) : 0; let nw, df = null; if (currentMode === 'COUNT') { nw = qty; df = nw - old; } else if (currentMode === 'IN') { nw = old + qty; } else { nw = old - qty; } await setDoc(ref, { sku, group, unit, qty: nw, category: cat, usage, model, lastOp: operatorId, time: serverTimestamp() }); await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'history'), { sku, type: currentMode, change: qty, after: nw, diff: df, op: operatorId, group, unit, timestamp: serverTimestamp(), comment: comment || "" }); showToast(`✅ ${sku} 同步成功`, true); resetActionFields(); } catch (e) { showToast("❌ 失敗", false); } finally { btn.disabled = false; setMode(currentMode); } }
        
        window.startScanner = async () => { document.getElementById('scanner-view').classList.remove('hidden'); html5QrCode = new Html5Qrcode("reader"); const cfg = { fps: 25, qrbox: { width: 280, height: 120 }, aspectRatio: 1.777778 }; await html5QrCode.start({ facingMode: "environment" }, cfg, (t) => { document.getElementById('input-sku').value = t; window.onSkuTyping(t); stopScanner(); }).catch(() => stopScanner()); };
        window.stopScanner = () => { if(html5QrCode) html5QrCode.stop().then(() => document.getElementById('scanner-view').classList.add('hidden')).catch(() => document.getElementById('scanner-view').classList.add('hidden')); else document.getElementById('scanner-view').classList.add('hidden'); };
        
        function renderStock(data) { const list = document.getElementById('stock-list'); if (!data || data.length === 0) return list.innerHTML = '<div class="py-20 text-slate-300 text-xs text-center italic uppercase">無庫存</div>'; list.innerHTML = data.map(i => { const gL = (i.group||"").split(","); const uL = (i.unit||"").split(","); const b = uL.map((u, idx) => `<span class="unit-badge">${(gL[idx]||gL[0])}_${u}</span>`).join(''); return `<div class="bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center shadow-sm active:bg-slate-50 transition-all text-left" onclick="autoFillStock('${i.sku}')"><div class="flex-1 pr-2 text-left"><div class="mb-1 flex flex-wrap gap-1 text-left text-left">${b}</div><div class="text-[10px] font-black text-blue-600 font-mono mb-0.5 uppercase tracking-tight text-left text-left">${i.model||'無型號'}</div><div class="font-black text-slate-800 text-sm font-mono leading-none break-all text-left text-left">${i.sku}</div><div class="text-[11px] text-slate-500 mt-2 font-black tracking-tight text-left text-left"><span class="text-slate-400 font-bold uppercase mr-1">${i.category}</span> | 位：${i.usage||'未註明'}</div></div><div class="flex items-center gap-3 text-center text-center"><div class="text-xl font-black ${i.qty < 0 ? 'text-red-500' : 'text-slate-800'} font-mono text-center">${i.qty}</div>${adminModeActive ? `<button onclick="event.stopPropagation(); deleteStockItem('${i.sku}')" class="p-2 bg-red-50 text-red-500 rounded-lg"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>` : ''}</div></div>`; }).join(''); }
        function renderHistory(logs) { const list = document.getElementById('history-list'); if (!logs.length) return list.innerHTML = '<div class="py-20 text-slate-300 text-xs text-center italic uppercase">無紀錄</div>'; list.innerHTML = logs.map(l => { const tC = l.type === 'IN' ? 'text-blue-500' : (l.type === 'OUT' ? 'text-orange-500' : 'text-emerald-500'); let qD = `${l.type} ${l.change}`; if (l.type === 'COUNT' && l.diff !== undefined) { const dS = l.diff > 0 ? '+' : ''; const dC = l.diff > 0 ? 'text-blue-600' : (l.diff < 0 ? 'text-red-600' : 'text-slate-400'); qD = `盤點: ${l.after} <span class="${dC}">(差值: ${dS}${l.diff})</span>`; } return `<div class="bg-white p-4 rounded-2xl border border-slate-50 shadow-sm text-[10px] space-y-1 relative text-left text-left"><div class="flex justify-between items-start text-left text-left"><div class="font-black text-slate-800 font-mono text-sm">${l.sku}</div><div class="flex items-center gap-3 text-left text-left"><div class="font-black ${tC} text-right uppercase text-left text-left">${qD}</div>${adminModeActive ? `<button onclick="deleteHistoryItem('${l.id}', ${JSON.stringify(l).replace(/"/g, '&quot;')})" class="p-1.5 bg-red-50 text-red-500 rounded-lg"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>` : ''}</div></div><div class="text-slate-400 font-medium">工號: ${l.op} • ${l.timestamp ? new Date(l.timestamp.toMillis()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '...'}</div><div class="text-slate-500 font-mono">${l.group||''}_${l.unit||''}</div>${l.comment ? `<div class="mt-2 bg-blue-50/50 text-blue-600 p-2 rounded-lg italic font-bold text-left text-left">備註: ${l.comment}</div>` : ''}</div>`; }).join(''); }
        
        window.resetActionFields = () => { document.getElementById('input-sku').value = ""; document.getElementById('input-model').value = ""; document.getElementById('input-unit').value = ""; document.getElementById('input-usage').value = ""; document.getElementById('input-qty').value = "1"; document.getElementById('input-group').selectedIndex = 0; document.getElementById('input-category').selectedIndex = 0; document.getElementById('sku-suggestions').classList.add('hidden'); };
        window.resetStockFilters = () => { document.getElementById('filter-group').selectedIndex = 0; updateUnitDropdown(); document.getElementById('filter-unit').selectedIndex = 0; updateCategoryDropdown(); document.getElementById('filter-category').selectedIndex = 0; applyFilters(); };
        function renderCats() { document.getElementById('input-category').innerHTML = '<option value="" disabled selected>類別選單</option>' + categories.map(c => `<option value="${c}">${c}</option>`).join(''); }
        function renderGroups() { document.getElementById('input-group').innerHTML = '<option value="" disabled selected>機群選單</option>' + machineGroups.map(g => `<option value="${g}">${g}</option>`).join(''); }
        function applyFilters() { const gF = document.getElementById('filter-group').value; const uF = document.getElementById('filter-unit').value; const cF = document.getElementById('filter-category').value; const search = document.querySelector('input[placeholder="搜尋關鍵字..."]').value.trim().toLowerCase(); let filtered = window.cachedStock || []; if (gF) filtered = filtered.filter(i => (i.group || "").includes(gF)); if (uF) filtered = filtered.filter(i => (i.unit || "").includes(uF)); if (cF) filtered = filtered.filter(i => i.category === cF); if (search) filtered = filtered.filter(i => (i.usage||'').toLowerCase().includes(search) || (i.sku||'').toLowerCase().includes(search) || (i.model||'').toLowerCase().includes(search) || (i.category||'').toLowerCase().includes(search)); renderStock(filtered); }
        function updateUnitDropdown() { const data = window.cachedStock || []; const selG = document.getElementById('filter-group').value; const uSet = new Set(); data.forEach(i => { const gL = (i.group || "").split(","); const uL = (i.unit || "").split(","); if (!selG) uL.forEach(u => uSet.add(u)); else uL.forEach((u, idx) => { if ((gL[idx]||gL[0]) === selG) uSet.add(u); }); }); document.getElementById('filter-unit').innerHTML = '<option value="">所有 Unit</option>' + Array.from(uSet).filter(Boolean).sort().map(u => `<option value="${u}">${u}</option>`).join(''); }
        function updateCategoryDropdown() { const data = window.cachedStock || []; const selG = document.getElementById('filter-group').value; const selU = document.getElementById('filter-unit').value; const cSet = new Set(); data.forEach(i => { const gL = (i.group || "").split(","); const uL = (i.unit || "").split(","); if (!selG && !selU) { if(i.category) cSet.add(i.category); } else { let match = false; uL.forEach((u, idx) => { if ((!selG || (gL[idx]||gL[0]) === selG) && (!selU || u === selU)) match = true; }); if (match && i.category) cSet.add(i.category); } }); document.getElementById('filter-category').innerHTML = '<option value="">所有類別</option>' + Array.from(cSet).filter(Boolean).sort().map(c => `<option value="${c}">${c}</option>`).join(''); }
        function refreshInitialFilters() { const data = window.cachedStock || []; const gS = new Set(); data.forEach(i => (i.group||"").split(",").forEach(s => gS.add(s.trim()))); document.getElementById('filter-group').innerHTML = '<option value="">所有機群</option>' + Array.from(gS).filter(Boolean).sort().map(g => `<option value="${g}">${g}</option>`).join(''); renderCats(); updateUnitDropdown(); updateCategoryDropdown(); }
        window.onFilterGroupChange = () => { document.getElementById('filter-unit').value = ""; document.getElementById('filter-category').value = ""; updateUnitDropdown(); updateCategoryDropdown(); applyFilters(); };
        window.onFilterUnitChange = () => { document.getElementById('filter-category').value = ""; updateCategoryDropdown(); applyFilters(); };
        
        document.addEventListener('click', (e) => { if (e.target.id !== 'input-sku') document.getElementById('sku-suggestions').classList.add('hidden'); });
        init();
    </script>
</body>
</html>
