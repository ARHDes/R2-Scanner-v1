<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>線邊倉助手 V14.8</title>
    <!-- [Debug 工具] 引入 Eruda：這能讓你在手機看到控制台 -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 800; }
        .unit-badge { display: inline-block; background: #f1f5f9; color: #334155; padding: 2px 8px; border-radius: 6px; font-size: 10px; margin-right: 4px; font-weight: 900; border: 1px solid #e2e8f0; }
        .clear-btn { opacity: 0; pointer-events: none; transition: all 0.2s; transform: scale(0.8); }
        .clear-btn.show { opacity: 1; pointer-events: auto; transform: scale(1); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20 font-sans text-slate-900 text-left">

    <!-- 登錄畫面與導覽列保持不變... (省略重複部分以節省篇幅，JS 部分是關鍵) -->
    <div id="setup-overlay" class="fixed inset-0 bg-blue-600 z-[1000] flex items-center justify-center p-6 hidden text-center">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl">
            <h2 class="text-2xl font-black mb-2">工號登錄</h2>
            <input type="text" id="operator-name-input" placeholder="請輸入工號" class="w-full border-2 rounded-xl px-4 py-3 mb-4 text-center font-bold">
            <button onclick="saveOperatorName()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">確認進入</button>
        </div>
    </div>

    <nav id="top-nav" class="bg-white border-b px-4 py-3 sticky top-0 z-50 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <div class="flex flex-col">
                <span id="admin-badge" class="hidden text-[8px] font-black bg-amber-500 text-white px-1.5 py-0.5 rounded-full mb-0.5 uppercase">管理模式</span>
                <span class="text-[10px] font-black text-slate-400">線邊倉助手</span>
                <span id="display-operator" class="text-sm font-bold text-slate-700">載入中...</span>
            </div>
        </div>
        <div class="flex items-center gap-1.5">
            <button id="admin-toggle-btn" onclick="toggleAdminMode()" class="hidden p-2 bg-amber-50 text-amber-600 rounded-lg border border-amber-100"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg></button>
            <button onclick="toggleSettingsManager(true)" class="p-2 bg-slate-100 rounded-lg text-slate-600"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg></button>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-4">
        <div class="flex bg-white rounded-xl p-1 shadow-sm border text-center">
            <button onclick="switchTab('action')" id="tab-action" class="flex-1 py-2 text-sm font-bold tab-active">操作頁面</button>
            <button onclick="switchTab('stock')" id="tab-stock" class="flex-1 py-2 text-sm font-bold text-slate-400">現存庫存</button>
            <button onclick="switchTab('history')" id="tab-history" class="flex-1 py-2 text-sm font-bold text-slate-400">歷史紀錄</button>
        </div>

        <div id="section-action" class="space-y-4"><div class="bg-white rounded-2xl p-5 shadow-sm border space-y-4 text-left">...操作介面...</div></div>
        <div id="section-stock" class="hidden space-y-4">
            <div class="bg-white p-4 rounded-2xl shadow-sm border space-y-3 text-left">
                <div class="flex justify-between items-center px-1">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest font-black">條件篩選</span>
                    <div class="flex gap-2">
                        <button onclick="resetStockFilters()" class="text-orange-500 text-[10px] font-bold border-b border-orange-200">清除篩選</button>
                        <button onclick="exportAndShareStock()" class="text-emerald-600 text-[10px] font-bold border-b border-emerald-200">匯出分享</button>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2"><select id="filter-group" onchange="onFilterGroupChange()" class="bg-slate-50 border-0 rounded-lg px-3 py-2 font-bold text-xs"></select><select id="filter-unit" onchange="onFilterUnitChange()" class="bg-slate-50 border-0 rounded-lg px-3 py-2 font-bold text-xs"></select></div>
                <input type="text" id="filter-usage" oninput="applyFilters()" placeholder="搜尋關鍵字..." class="w-full bg-slate-50 border-0 rounded-lg px-3 py-2.5 text-xs font-bold">
            </div>
            <!-- 這裡是庫存顯示區 -->
            <div id="stock-list" class="space-y-2"></div>
        </div>
        <div id="section-history" class="hidden"><div id="history-list" class="space-y-2"></div></div>
    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 text-white px-6 py-3 rounded-full text-[12px] font-black opacity-0 transition-all z-[9000] shadow-2xl flex items-center gap-2"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, serverTimestamp, getDoc, writeBatch, deleteDoc, runTransaction } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDlrIJR7wKN_lzcTiC2ohe8jeXaC3mZXdk", authDomain: "storage-3098e.firebaseapp.com", projectId: "storage-3098e", storageBucket: "storage-3098e.firebasestorage.app", messagingSenderId: "947569272384", appId: "1:947569272384:web:badb6b78e91e36cee5a1a5", measurementId: "G-1WEQXLGR20" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'shared-ims-storage-3098e'; 
        const ADMIN_ID = 'Admin'; 

        let operatorId = localStorage.getItem('ims_op_v13_4'); 
        let currentMode = 'IN';
        let adminModeActive = false;

        async function init() {
            if (!operatorId) document.getElementById('setup-overlay').classList.remove('hidden');
            else { document.getElementById('display-operator').innerText = `👤 工號: ${operatorId}`; checkAdminStatus(); }
            try { await signInAnonymously(auth); onAuthStateChanged(auth, (u) => { if (u) loadCloudData(); }); } catch (err) { console.error("Firebase Auth Error:", err); }
        }

        function loadCloudData() {
            // [Debug] 開始讀取資料
            console.log("開始從 Firestore 讀取資料...");
            
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'stock'), (s) => {
                const data = s.docs.map(d => d.data());
                console.log("成功獲取庫存資料，共計:", data.length, "筆");
                window.cachedStock = data;
                renderStock(data); // 這裡會觸發渲染
            }, (err) => {
                console.error("Firestore 監聽失敗:", err);
                showToast("連線失敗: " + err.message, false);
            });
        }

        // --- [關鍵試錯函數] renderStock ---
        // 就像 C 語言的渲染循環，一旦其中一個數據指標錯誤，整個繪圖就會停止
        function renderStock(data) {
            const list = document.getElementById('stock-list');
            
            // 防呆 1: 檢查 list 元素是否存在
            if (!list) {
                console.error("找不到 HTML 中的 stock-list 元素！");
                return;
            }

            if (!data || data.length === 0) {
                list.innerHTML = '<div class="py-20 text-slate-300 text-xs text-center uppercase">無庫存資料</div>';
                return;
            }

            // 防呆 2: 使用 try...catch 捕捉循環中的崩潰
            try {
                list.innerHTML = data.map((i, index) => {
                    // [ Debug 點 ] 檢查 i 裡面的屬性
                    // 在 C 語言這就是防範 Null Pointer
                    const sku = i.sku || "未知料號";
                    const groupStr = i.group || ""; // 如果是 null 就轉為空字串
                    const unitStr = i.unit || "";
                    
                    // 這裡最容易噴錯：如果 groupStr 是 undefined，呼叫 .split 就會整組當機
                    const gL = groupStr.split(",");
                    const uL = unitStr.split(",");
                    
                    const badges = uL.map((u, idx) => {
                        const g = gL[idx] || gL[0] || "未註明";
                        return `<span class="unit-badge">${g}_${u}</span>`;
                    }).join('');

                    return `
                    <div class="bg-white p-4 rounded-2xl border shadow-sm text-left mb-2">
                        <div class="flex-1">
                            <div class="mb-1 flex flex-wrap gap-1">${badges}</div>
                            <div class="text-[10px] font-black text-blue-600 font-mono">${i.model || ''}</div>
                            <div class="font-black text-slate-800 text-sm font-mono">${sku}</div>
                            <div class="text-[11px] text-slate-500 mt-2 font-black">
                                <span class="text-slate-400 font-bold uppercase mr-1">${i.category || "其他"}</span> | 位：${i.usage || '未註明'}
                            </div>
                        </div>
                        <div class="text-right mt-2">
                            <span class="text-xl font-black font-mono">${i.qty}</span>
                        </div>
                    </div>`;
                }).join('');
                
                console.log("渲染完成！");
            } catch (err) {
                // 如果失敗了，我們把報錯「印在網頁畫面上」
                console.error("渲染過程出錯:", err);
                list.innerHTML = `
                    <div class="p-6 bg-red-50 text-red-600 rounded-xl border border-red-200 text-xs">
                        <p class="font-black mb-2">⚠️ 程式執行崩潰 (C-Style Crash)</p>
                        <p class="font-mono bg-white p-2 border rounded">${err.message}</p>
                        <p class="mt-2">請點擊右下角齒輪查看 Console 找出出問題的資料筆數。</p>
                    </div>`;
            }
        }

        // 其餘功能簡化... 
        window.saveOperatorName = () => { /* 儲存邏輯 */ };
        window.switchTab = (t) => {
            ['action','stock','history'].forEach(x => document.getElementById(`section-${x}`).classList.toggle('hidden', x !== t));
            if (t === 'stock' && window.cachedStock) renderStock(window.cachedStock);
        };
        function showToast(m, s = true) { /* Toast 邏輯 */ }
        init();
    </script>
</body>
</html>
