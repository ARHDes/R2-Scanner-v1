<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>線邊倉助手 V2.1.1</title>
    <!-- 手機 Debug 工具 -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 800; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .suggestion-item { padding: 10px 14px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
        .suggestion-item:active { background: #eff6ff; }
        .admin-glow { box-shadow: 0 0 15px rgba(245, 158, 11, 0.3); border: 1px solid rgba(245, 158, 11, 0.5); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .unit-badge { display: inline-block; background: #f1f5f9; color: #334155; padding: 2px 8px; border-radius: 6px; font-size: 10px; margin-right: 4px; font-weight: 900; border: 1px solid #e2e8f0; }
        .clear-btn { opacity: 0; pointer-events: none; transition: all 0.2s; transform: scale(0.8); }
        .clear-btn.show { opacity: 1; pointer-events: auto; transform: scale(1); }
        #reader__scan_region { border-radius: 20px; overflow: hidden; }
        #reader__dashboard { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20 font-sans text-slate-900 text-left">

    <!-- 登錄頁面 -->
    <div id="setup-overlay" class="fixed inset-0 bg-blue-600 z-[1000] flex items-center justify-center p-6 hidden text-center">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl border-4 border-blue-400 text-center">
            <h2 class="text-2xl font-black mb-2 text-slate-800 tracking-tight">工號登錄</h2>
            <p class="text-slate-500 text-sm mb-6 font-medium text-center">請輸入員工編號以開始作業</p>
            <input type="text" id="operator-name-input" placeholder="請輸入工號" class="w-full border-2 border-slate-100 rounded-xl px-4 py-3 mb-4 outline-none focus:border-blue-500 text-center font-bold text-lg text-center">
            <button onclick="window.saveOperatorName()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg active:scale-95 transition-all text-center">確認進入系統</button>
        </div>
    </div>

    <!-- 導覽列 -->
    <nav id="top-nav" class="bg-white border-b border-slate-200 px-4 py-3 sticky top-0 z-50 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <div class="flex flex-col text-left">
                <span id="admin-badge" class="hidden text-[8px] font-black bg-amber-500 text-white px-1.5 py-0.5 rounded-full w-fit mb-0.5 uppercase shadow-sm">管理模式</span>
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-tighter">線邊倉助手 V2.1.1</span>
                <span id="display-operator" class="text-sm font-bold text-slate-700 font-mono tracking-tight leading-none text-left">載入中...</span>
            </div>
        </div>
        <div class="flex items-center gap-1.5 text-center">
            <button id="admin-toggle-btn" onclick="window.toggleAdminMode()" class="hidden p-2 bg-amber-50 text-amber-600 rounded-lg border border-amber-100 active:scale-90 transition-transform"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg></button>
            <button onclick="window.toggleSettingsManager(true)" class="p-2 bg-slate-100 rounded-lg text-slate-600 active:scale-90 transition-transform"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg></button>
            <button onclick="window.logout()" class="p-2 bg-red-50 text-red-500 rounded-lg border border-red-100 active:scale-90 transition-transform"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg></button>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-4">
        <!-- 分頁切換 -->
        <div class="flex bg-white rounded-xl p-1 shadow-sm border border-slate-100 text-center text-center">
            <button id="tab-action-btn" onclick="window.switchTab('action')" class="flex-1 py-2 text-sm font-bold tab-active transition-all">操作頁面</button>
            <button id="tab-stock-btn" onclick="window.switchTab('stock')" class="flex-1 py-2 text-sm font-bold text-slate-400 transition-all">現存庫存</button>
            <button id="tab-history-btn" onclick="window.switchTab('history')" class="flex-1 py-2 text-sm font-bold text-slate-400 transition-all">歷史紀錄</button>
        </div>

        <!-- 區塊：操作頁面 -->
        <div id="section-action" class="space-y-4 animate-in fade-in duration-300">
            <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 space-y-4 text-left">
                <div class="flex justify-between items-center px-1">
                    <div class="flex gap-2 p-1 bg-slate-50 rounded-xl flex-1 text-center mr-4">
                        <button id="mode-in" onclick="window.setMode('IN')" class="flex-1 py-2 rounded-lg bg-blue-600 text-white font-bold text-xs shadow-md">入庫</button>
                        <button id="mode-out" onclick="window.setMode('OUT')" class="flex-1 py-2 rounded-lg text-slate-400 font-bold text-xs">出庫</button>
                        <button id="mode-count" onclick="window.setMode('COUNT')" class="flex-1 py-2 rounded-lg text-slate-400 font-bold text-xs">盤點</button>
                    </div>
                    <button onclick="window.resetActionFields()" class="text-blue-500 text-[10px] font-bold border-b border-blue-200 pb-0.5 active:text-blue-700">重設內容</button>
                </div>
                
                <div class="space-y-3 relative text-left">
                    <div class="grid grid-cols-2 gap-3 text-left">
                        <div class="space-y-1"><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">機群</label><select id="input-group" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 text-sm font-bold text-slate-800 outline-none focus:ring-2 focus:ring-blue-500"></select></div>
                        <div class="space-y-1"><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Unit名稱</label><input type="text" id="input-unit" placeholder="例如：PC" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 text-left"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 text-left">
                        <div class="space-y-1"><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">類別</label><select id="input-category" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 text-sm font-bold text-slate-800 outline-none focus:ring-2 focus:ring-blue-500"></select></div>
                        <div class="space-y-1"><label class="text-[10px] font-bold text-slate-400 uppercase ml-1 text-left">位置 / 用途</label><input type="text" id="input-usage" placeholder="備註位置..." class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 text-left"></div>
                    </div>
                    <div class="space-y-1"><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">型號 (Model)</label><input type="text" id="input-model" placeholder="零件規格型號..." class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 font-mono text-left"></div>
                    
                    <div class="space-y-1 text-left">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1">料號 / 條碼</label>
                        <div class="flex gap-2 text-left">
                            <div class="relative flex-1">
                                <input type="text" id="input-sku" oninput="window.onSkuTyping(this.value)" placeholder="搜尋料號..." class="w-full bg-slate-50 border-0 rounded-xl pl-4 pr-10 py-3 text-sm outline-none focus:ring-2 focus:ring-blue-500 font-mono" autocomplete="off">
                                <button id="btn-clear-sku" onclick="window.clearSkuInput()" class="clear-btn absolute right-3 top-1/2 -translate-y-1/2 text-slate-300 active:scale-90"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
                            </div>
                            <button onclick="window.startScanner()" class="bg-blue-100 text-blue-600 p-3 rounded-xl active:scale-90"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"></path></svg></button>
                        </div>
                        <div id="sku-suggestions" class="absolute left-0 right-0 bg-white border border-slate-200 rounded-xl shadow-xl z-50 mt-1 hidden max-h-60 overflow-y-auto hide-scroll text-left"></div>
                    </div>

                    <div class="space-y-1 text-center">
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 text-left">異動數量</label>
                        <div class="flex items-center bg-slate-50 rounded-xl p-1 text-center">
                            <button onclick="window.stepQty(-1)" class="w-12 h-10 bg-white rounded-lg shadow-sm font-bold text-xl active:bg-slate-100">-</button>
                            <input type="number" id="input-qty" value="1" class="flex-1 bg-transparent text-center font-black text-xl outline-none">
                            <button onclick="window.stepQty(1)" class="w-12 h-10 bg-white rounded-lg shadow-sm font-bold text-xl active:bg-slate-100">+</button>
                        </div>
                    </div>
                    <button id="btn-submit" onclick="window.submitTransaction()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-lg shadow-xl active:scale-95 transition-all text-center">確認入庫</button>
                </div>
            </div>
        </div>

        <!-- 區塊：庫存清單 -->
        <div id="section-stock" class="hidden space-y-4 animate-in fade-in duration-300 text-left">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 space-y-3">
                <div class="flex justify-between items-center px-1">
                    <span class="text-[10px] font-bold text-slate-400 uppercase font-black">條件篩選</span>
                    <div class="flex gap-3">
                        <button onclick="window.resetStockFilters()" class="text-orange-500 text-[10px] font-bold border-b border-orange-200 active:text-orange-700 pb-0.5">清除篩選</button>
                        <button onclick="window.openImportModal()" class="text-blue-600 text-[10px] font-bold border-b border-blue-200 pb-0.5">文字匯入</button>
                        <button onclick="window.exportAndShareStock()" class="text-emerald-600 text-[10px] font-bold border-b border-emerald-200 pb-0.5">分享匯出</button>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2 text-left">
                    <select id="filter-group" onchange="window.onFilterGroupChange()" class="bg-slate-50 border-0 rounded-lg px-3 py-2 font-bold outline-none focus:ring-1 focus:ring-blue-500 font-mono text-xs"></select>
                    <select id="filter-unit" onchange="window.onFilterUnitChange()" class="bg-slate-50 border-0 rounded-lg px-3 py-2 font-bold outline-none focus:ring-1 focus:ring-blue-500 font-mono text-xs"></select>
                </div>
                <select id="filter-category" onchange="window.applyFilters()" class="w-full bg-slate-50 border-0 rounded-lg px-3 py-2.5 font-bold outline-none focus:ring-1 focus:ring-blue-500 text-xs text-left"></select>
                <input type="text" id="filter-usage" oninput="window.applyFilters()" placeholder="搜尋型號、料號、關鍵字..." class="w-full bg-slate-50 border-0 rounded-lg px-3 py-2.5 text-xs font-bold outline-none focus:ring-1 focus:ring-blue-500">
            </div>
            <div id="stock-list" class="space-y-2"></div>
        </div>

        <!-- 區塊：歷史紀錄 -->
        <div id="section-history" class="hidden space-y-3 animate-in fade-in duration-300 text-left"><div id="history-list" class="space-y-2 text-left"></div></div>
    </main>

    <!-- 彈窗群 -->
    <div id="comment-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[4800] hidden flex items-center justify-center p-6 text-center text-center text-center" onclick="window.closeCommentModal()">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 space-y-4 shadow-2xl text-left" onclick="event.stopPropagation()">
            <div class="text-center font-black"><h3 class="text-lg">紀錄備註 (Comment)</h3></div>
            <textarea id="transaction-comment" placeholder="異動原因..." class="w-full h-24 bg-slate-50 border rounded-2xl p-3 text-sm outline-none focus:border-blue-500 text-left"></textarea>
            <div class="flex gap-3 text-center"><button onclick="window.closeCommentModal()" class="flex-1 py-3 bg-slate-100 rounded-xl font-bold text-slate-500 text-center">取消</button><button onclick="window.confirmTransactionWithComment()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg text-center">確認送出</button></div>
        </div>
    </div>

    <div id="context-picker-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[4500] hidden flex items-center justify-center p-6 text-center text-center" onclick="window.closeContextPicker()">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 space-y-4 shadow-2xl text-left text-left text-left" onclick="event.stopPropagation()">
            <div class="text-center font-black"><h3>機台用途選取</h3><p class="text-[10px] text-slate-400 mt-1">此為共用料號，請選取對象：</p></div>
            <div id="context-options-list" class="space-y-2 max-h-64 overflow-y-auto pr-1 hide-scroll font-sans text-left"></div>
            <div id="admin-full-delete-zone" class="hidden pt-2 border-t border-slate-100 text-center"><button onclick="window.executeFullDeleteFromPicker()" class="w-full py-3 bg-red-50 text-red-600 rounded-xl font-bold text-xs active:bg-red-100">永久徹底刪除整個料號</button></div>
            <button onclick="window.closeContextPicker()" class="w-full py-3 bg-slate-100 rounded-xl font-bold text-slate-500 text-center">取消選取</button>
        </div>
    </div>

    <div id="import-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[2000] hidden flex items-center justify-center p-6 text-left" onclick="window.closeImportModal()">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 space-y-4 shadow-2xl text-left" onclick="event.stopPropagation()">
            <h3 class="text-xl font-black">智慧文字匯入</h3>
            <p class="text-[10px] text-slate-400 mt-1 leading-relaxed">格式：機群,Unit,類別,位置,料號,數量,型號</p>
            <textarea id="import-text-area" placeholder="CSCR,PC,CYLINDER,Clamp,SKU,0,MODEL" class="w-full h-48 bg-slate-50 border-2 border-dashed rounded-xl p-3 text-xs font-mono outline-none"></textarea>
            <div class="flex gap-3 text-center"><button onclick="window.closeImportModal()" class="flex-1 py-3 bg-slate-100 rounded-xl font-bold text-slate-500 text-center">取消</button><button onclick="window.processPastedText()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold text-center">匯入</button></div>
        </div>
    </div>

    <div id="confirm-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[4000] hidden flex items-center justify-center p-6 text-left">
        <div class="bg-white w-full max-w-xs rounded-3xl p-6 space-y-4 shadow-2xl text-left">
            <h3 id="confirm-title" class="text-lg font-black text-center">操作確認</h3>
            <div id="confirm-modal-msg" class="text-xs text-slate-500 leading-relaxed text-left"></div>
            <div id="confirm-standard-actions" class="flex flex-col gap-2 pt-2 text-center text-center"></div>
        </div>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black/60 z-[100] hidden flex items-center justify-center p-6 text-left text-left" onclick="window.toggleSettingsManager(false)">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 space-y-6 shadow-2xl text-left" onclick="event.stopPropagation()">
            <div class="space-y-3 text-left"><h3 class="text-sm font-black border-l-4 border-blue-500 pl-2 text-left">類別管理</h3><div id="admin-cat-controls" class="hidden flex gap-2"><input type="text" id="new-category-name" placeholder="名稱..." class="flex-1 bg-slate-50 rounded-xl px-3 py-2 text-xs outline-none"><button onclick="window.addNewCategory()" class="bg-blue-600 text-white px-4 rounded-xl font-bold active:scale-90">+</button></div><div id="category-list-manager" class="space-y-1.5 max-h-32 overflow-y-auto font-mono text-left"></div></div>
            <div class="space-y-3 text-left"><h3 class="text-sm font-black border-l-4 border-amber-500 pl-2 text-left">機群管理</h3><div id="admin-group-controls" class="hidden flex gap-2"><input type="text" id="new-group-name" placeholder="名稱..." class="flex-1 bg-slate-50 rounded-xl px-3 py-2 text-xs outline-none"><button onclick="window.addNewGroup()" class="bg-amber-500 text-white px-4 rounded-xl font-bold active:scale-90">+</button></div><div id="group-list-manager" class="space-y-1.5 max-h-32 overflow-y-auto font-mono text-left"></div></div>
            <button onclick="window.toggleSettingsManager(false)" class="w-full py-3 bg-slate-100 rounded-xl font-bold text-slate-500 text-sm active:bg-slate-200">關閉面板</button>
        </div>
    </div>

    <div id="scanner-view" class="fixed inset-0 bg-black z-[6000] hidden flex flex-col text-left">
        <div class="bg-black/60 p-6 flex justify-between items-center text-white">
            <div class="font-black tracking-tight">條碼掃描</div>
            <button onclick="window.stopScanner()" class="bg-white/10 p-2 rounded-full"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        </div>
        <div id="reader" class="flex-1 bg-black"></div>
        <div class="p-10 bg-black/80 text-center text-center"><p class="text-white/40 text-[10px] font-bold mb-4 uppercase text-center">長形條碼請置於框內</p><button onclick="window.stopScanner()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-black">關閉相機</button></div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 text-white px-6 py-3 rounded-full text-[12px] font-black opacity-0 transition-all z-[9000] shadow-2xl flex items-center gap-2 text-center"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, serverTimestamp, getDoc, writeBatch, deleteDoc, runTransaction } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 初始化
        const firebaseConfig = { apiKey: "AIzaSyDlrIJR7wKN_lzcTiC2ohe8jeXaC3mZXdk", authDomain: "storage-3098e.firebaseapp.com", projectId: "storage-3098e", storageBucket: "storage-3098e.firebasestorage.app", messagingSenderId: "947569272384", appId: "1:947569272384:web:badb6b78e91e36cee5a1a5", measurementId: "G-1WEQXLGR20" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'shared-ims-storage-3098e'; 
        const ADMIN_ID = 'Admin'; 

        // 全域變數
        window.operatorId = localStorage.getItem('ims_op_v13_4'); 
        window.currentMode = 'IN';
        window.adminModeActive = false;
        window.categories = [];
        window.machineGroups = [];
        window.html5QrCode = null;
        window.pendingTransaction = null;
        window.activePickerSku = null;
        window.cachedStock = [];
        window.cachedHistory = [];

        // 點擊外部隱藏提示清單
        document.addEventListener('click', (e) => {
            if (e.target.id !== 'input-sku') {
                const sugg = document.getElementById('sku-suggestions');
                if(sugg) sugg.classList.add('hidden');
            }
        });

        // ==========================================
        // 所有函數強制掛載於 window
        // ==========================================

        window.init = async () => {
            if (!window.operatorId) {
                document.getElementById('setup-overlay').classList.remove('hidden');
            } else { 
                document.getElementById('display-operator').innerText = `👤 工號: ${window.operatorId}`; 
                window.checkAdminStatus(); 
            }
            try { 
                await signInAnonymously(auth); 
                onAuthStateChanged(auth, (u) => { if (u) window.loadCloudData(); }); 
            } catch (err) {}
        };

        window.checkAdminStatus = () => {
            if (window.operatorId === ADMIN_ID) {
                document.getElementById('admin-toggle-btn').classList.remove('hidden');
                document.getElementById('display-operator').classList.add('text-amber-600');
            }
        };

        window.showToast = (msg, success = true) => {
            const t = document.getElementById('toast');
            if(!t) return;
            t.className = `fixed bottom-10 left-1/2 -translate-x-1/2 text-white px-6 py-3 rounded-full text-[12px] font-black opacity-0 transition-all z-[9000] shadow-2xl flex items-center gap-2 ${success ? 'bg-emerald-600' : 'bg-red-600'}`;
            t.innerHTML = `${success ? '✅' : '❌'} <span>${msg}</span>`;
            t.style.opacity = "1";
            setTimeout(() => t.style.opacity = "0", 3000);
        };

        window.loadCloudData = () => {
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'categories', 'all'), (s) => { 
                window.categories = s.exists() ? s.data().list : ['培林', '氣壓缸']; 
                window.renderCats(); 
            });
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'groups', 'all'), (s) => { 
                window.machineGroups = s.exists() ? s.data().list : ['CSCR', 'CST', 'CV']; 
                window.renderGroups(); 
            });
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'stock'), (s) => { 
                window.cachedStock = s.docs.map(d => d.data()); 
                window.refreshInitialFilters(); 
                window.applyFilters(); 
            });

        window.autoFillStock = (sku) => {
            document.getElementById('sku-suggestions')?.classList.add('hidden'); 
            const it = window.cachedStock.find(i => i.sku === sku); if (!it) return;
            const gL = (it.group || "").split(",").map(s => s.trim()).filter(Boolean);
            const uL = (it.unit || "").split(",").map(s => s.trim()).filter(Boolean);
            const usL = (it.usage || "").split(",").map(s => s.trim());
            const count = Math.max(gL.length, uL.length);

                window.activePickerSku = sku;

        window.applyContext = (sku, g, u, cat, usage, model) => {

            const fU = document.getElementById('filter-unit'); if(fU) fU.selectedIndex = 0;
            const fC = document.getElementById('filter-category'); if(fC) fC.selectedIndex = 0;
            const fS = document.getElementById('filter-usage'); if(fS) fS.value = "";

        };

        window.onFilterGroupChange = () => { window.updateUnitDropdown(); window.applyFilters(); };
        window.onFilterUnitChange = () => { window.applyFilters(); };

        window.submitTransaction = () => {
            const sku = document.getElementById('input-sku').value.trim();
            const group = document.getElementById('input-group').value;
            const unit = document.getElementById('input-unit').value.trim();
            const cat = document.getElementById('input-category').value;
            const usage = document.getElementById('input-usage').value.trim();
            const model = document.getElementById('input-model').value.trim();
            const qty = parseInt(document.getElementById('input-qty').value) || 0;

            if (!sku || !group || !unit || !cat) return window.showToast("⚠️ 欄位未填齊", false);
            
            const existing = window.cachedStock.find(i => i.sku === sku);
            if (existing) {
                const gL = (existing.group || "").split(",").map(s => s.trim());
                const uL = (existing.unit || "").split(",").map(s => s.trim());
                const usL = (existing.usage || "").split(",").map(s => s.trim());
                let match = false;
                for(let i=0; i<Math.max(gL.length, uL.length, usL.length); i++) { 
                    if(gL[i] === group && uL[i] === unit && (usL[i]||"") === usage) match = true; 
                }
                if (!match || existing.category !== cat || (existing.model||"") !== model) {
                    window.pendingTransaction = { sku, group, unit, cat, usage, qty, model };
                    window.showConfirmModal("環境衝突", `與雲端設定不符，是否設為共用？`, [
                        { text: "設為共用", color: "bg-blue-600", action: () => { window.closeConfirmModal(); window.openCommentModal('MERGE'); } },
                        { text: "強制覆蓋", color: "bg-amber-500", action: () => { window.closeConfirmModal(); window.openCommentModal('OVERWRITE'); } },
                        { text: "取消", color: "bg-slate-100", textColor: "text-slate-500", action: () => window.closeConfirmModal() }
                    ]); return;
                }
            }
            window.pendingTransaction = { sku, group, unit, cat, usage, qty, model, conflictAction: null };
            document.getElementById('transaction-comment').value = "";
            document.getElementById('comment-modal').classList.remove('hidden');
        };

        window.openCommentModal = (action) => {
            if(window.pendingTransaction) window.pendingTransaction.conflictAction = action;
            document.getElementById('transaction-comment').value = "";
            document.getElementById('comment-modal').classList.remove('hidden');
        };

        window.confirmTransactionWithComment = async () => {
            const comment = document.getElementById('transaction-comment').value.trim();
            window.closeCommentModal();
            let { sku, group, unit, cat, usage, qty, model, conflictAction } = window.pendingTransaction;
            
            if (conflictAction === 'MERGE') {
                const ex = window.cachedStock.find(i => i.sku === sku);
                const gS = new Set(ex.group.split(",").map(u => u.trim())); 
                const uS = new Set(ex.unit.split(",").map(u => u.trim())); 
                const usS = new Set((ex.usage || "").split(",").map(u => u.trim()));
                gS.add(group); uS.add(unit); if(usage) usS.add(usage);
                group = Array.from(gS).join(", "); unit = Array.from(uS).join(", "); usage = Array.from(usS).join(", ");
            }

            const btn = document.getElementById('btn-submit');
            if(btn) btn.disabled = true;
            try {
                const ref = doc(db, 'artifacts', appId, 'public', 'data', 'stock', sku);
                const snap = await getDoc(ref);
                const oldQty = snap.exists() ? (parseInt(snap.data().qty) || 0) : 0;
                let newQty = window.currentMode === 'IN' ? oldQty + qty : (window.currentMode === 'OUT' ? oldQty - qty : qty);
                let diff = window.currentMode === 'COUNT' ? newQty - oldQty : null;
                
                await setDoc(ref, { sku, group, unit, qty: newQty, category: cat, usage, model, lastOp: window.operatorId, time: serverTimestamp() });
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'history'), { sku, type: window.currentMode, change: qty, after: newQty, diff, op: window.operatorId, group, unit, timestamp: serverTimestamp(), comment });
                
                window.showToast(`✅ ${sku} 同步成功`, true); 
                window.resetActionFields();
            } catch (e) { 
                window.showToast("❌ 提交失敗", false); 
            } finally { 
                if(btn) btn.disabled = false; 
                window.setMode(window.currentMode); 
            }
        };

        // --- 管理員操作功能 ---
        window.deleteHistoryItem = async (id, data) => {
            if (!window.adminModeActive || !confirm("確定回退並刪除？")) return;
            try {
                await runTransaction(db, async (tx) => {
                    const sRef = doc(db, 'artifacts', appId, 'public', 'data', 'stock', data.sku);
                    const sSnap = await tx.get(sRef);
                    if (!sSnap.exists()) throw "無庫存";
                    const cur = parseInt(sSnap.data().qty) || 0;
                    let rb = cur;
                    if (data.type === 'IN') rb = cur - data.change;
                    else if (data.type === 'OUT') rb = cur + data.change;
                    else rb = cur - (data.diff || 0);
                    tx.delete(doc(db, 'artifacts', appId, 'public', 'data', 'history', id));
                    tx.update(sRef, { qty: rb, lastOp: `${window.operatorId}(Rb)` });
                });
                window.showToast("🗑️ 已回退", true);
            } catch (e) { window.showToast("回退失敗", false); }
        };

                window.showToast(`🗑️ 已刪除`, true); 
            }

        window.executePartialDelete = async (sku, idx) => {
            const item = window.cachedStock.find(i => i.sku === sku);
            const gL = item.group.split(",").map(s => s.trim());
            const uL = item.unit.split(",").map(s => s.trim());
            const usL = (item.usage||"").split(",").map(s => s.trim());
            gL.splice(idx, 1); uL.splice(idx, 1); if (usL.length > idx) usL.splice(idx, 1);
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'stock', sku), { ...item, group: gL.join(", "), unit: uL.join(", "), usage: usL.join(", "), lastOp: window.operatorId });

        window.removeGroup = async (n) => { if(confirm(`移除機群 ${n}？`)) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'groups', 'all'), { list: window.machineGroups.filter(x => x !== n) }); };

        window.processPastedText = async () => {
            const input = document.getElementById('import-text-area'); const txt = input.value.trim(); if (!txt) return window.showToast("⚠️ 請貼入內容", false);
            const rows = txt.split(/\r?\n/).filter(r => r.trim() !== ""); const batch = writeBatch(db); const map = new Map();
            try {
                let sT = (rows[0].includes("機群") || rows[0].includes("料號")) ? 1 : 0;
                for (let i = sT; i < rows.length; i++) {
                    const c = rows[i].split(",").map(s => s.trim().replace(/^"|"$/g, "")); if (c.length < 5) continue;
                    const [g, u, cat, us, sku, qtyS, model] = c; if (!sku) continue;
                    if (!map.has(sku)) map.set(sku, { groups: new Set([g]), units: new Set([u]), usages: new Set([us || ""]), category: cat, qty: parseInt(qtyS)||0, model: model||"" });
                    else { const m = map.get(sku); m.groups.add(g); m.units.add(u); m.usages.add(us || ""); m.qty = parseInt(qtyS)||0; if(model) m.model = model; }
                }
                for (const [sku, inp] of map) {
                    const cl = window.cachedStock.find(it => it.sku === sku); let fG, fU, fUs;
                    if (cl) {
                        const gS = new Set(cl.group.split(",").map(s => s.trim())); const uS = new Set(cl.unit.split(",").map(s => s.trim())); const usS = new Set((cl.usage || "").split(",").map(s => s.trim()));
                        inp.groups.forEach(v => gS.add(v)); inp.units.forEach(v => uS.add(v)); inp.usages.forEach(v => usS.add(v));
                        fG = Array.from(gS).filter(Boolean).join(", "); fU = Array.from(uS).filter(Boolean).join(", "); fUs = Array.from(usS).filter(Boolean).join(", ");
                    } else { fG = Array.from(inp.groups).join(", "); fU = Array.from(inp.units).join(", "); fUs = Array.from(inp.usages).join(", "); }
                    batch.set(doc(db, 'artifacts', appId, 'public', 'data', 'stock', sku), { sku, group: fG, unit: fU, category: inp.category||"其他", usage: fUs, qty: inp.qty, model: inp.model, lastOp: window.operatorId+"(匯入)", time: serverTimestamp() });
                }
                await batch.commit(); window.showToast("✅ 匯入完成", true); input.value = ""; window.closeImportModal();
            } catch (e) { window.showToast("❌ 錯誤", false); }
        };

        // --- 彈窗控制等其餘功能 ---
        window.closeCommentModal = () => document.getElementById('comment-modal').classList.add('hidden');
        window.closeContextPicker = () => document.getElementById('context-picker-modal').classList.add('hidden');
        window.closeImportModal = () => document.getElementById('import-modal').classList.add('hidden');
        window.openImportModal = () => document.getElementById('import-modal').classList.remove('hidden');
        window.showConfirmModal = (t, m, a) => { document.getElementById('confirm-title').innerText = t; document.getElementById('confirm-modal-msg').innerHTML = m; const c = document.getElementById('confirm-standard-actions'); c.innerHTML = ""; a.forEach(x => { const b = document.createElement('button'); b.className = `w-full py-3 rounded-xl font-bold text-xs ${x.color} ${x.textColor || 'text-white'}`; b.innerText = x.text; b.onclick = x.action; c.appendChild(b); }); document.getElementById('confirm-modal').classList.remove('hidden'); };
        window.closeConfirmModal = () => document.getElementById('confirm-modal').classList.add('hidden');
        window.toggleSettingsManager = (s) => { document.getElementById('settings-modal').classList.toggle('hidden', !s); if(s) { document.getElementById('admin-cat-controls').classList.toggle('hidden', !window.adminModeActive); document.getElementById('admin-group-controls').classList.toggle('hidden', !window.adminModeActive); } };
        window.toggleAdminMode = () => { window.adminModeActive = !window.adminModeActive; document.getElementById('top-nav').classList.toggle('admin-glow', window.adminModeActive); document.getElementById('admin-badge').classList.toggle('hidden', !window.adminModeActive); window.applyFilters(); window.renderHistory(window.cachedHistory); window.renderCats(); window.renderGroups(); };
        window.saveOperatorName = () => { const id = document.getElementById('operator-name-input').value.trim(); if (!id) return; localStorage.setItem('ims_op_v13_4', id); location.reload(); };
        window.logout = () => { if(confirm("登出？")) { localStorage.removeItem('ims_op_v13_4'); location.reload(); } };
        window.stepQty = (v) => { const i = document.getElementById('input-qty'); i.value = Math.max(0, (parseInt(i.value) || 0) + v); };
        window.exportAndShareStock = () => { const ws = XLSX.utils.json_to_sheet(window.cachedStock); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "庫存"); XLSX.writeFile(wb, "線邊倉報表.xlsx"); };
        window.startScanner = async () => { document.getElementById('scanner-view').classList.remove('hidden'); window.html5QrCode = new Html5Qrcode("reader"); await window.html5QrCode.start({ facingMode: "environment" }, { fps: 25, qrbox: { width: 280, height: 120 } }, (t) => { document.getElementById('input-sku').value = t; window.stopScanner(); window.onSkuTyping(t); }); };
        window.stopScanner = () => { if(window.html5QrCode) window.html5QrCode.stop().then(() => document.getElementById('scanner-view').classList.add('hidden')); };

        // 系統啟動
        window.init();
    </script>
</body>
</html>
