<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>線邊倉助手 V2.0.1</title>
    <!-- 手機 Debug 工具：齒輪點開點 Console -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 800; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .suggestion-item { padding: 10px 14px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
        .suggestion-item:active { background: #eff6ff; }
        .admin-glow { box-shadow: 0 0 15px rgba(245, 158, 11, 0.3); border: 1px solid rgba(245, 158, 11, 0.5); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .unit-badge { display: inline-block; background: #f1f5f9; color: #334155; padding: 2px 8px; border-radius: 6px; font-size: 10px; margin-right: 4px; font-weight: 900; border: 1px solid #e2e8f0; }
        .clear-btn { opacity: 0; pointer-events: none; transition: all 0.2s; transform: scale(0.8); }
        .clear-btn.show { opacity: 1; pointer-events: auto; transform: scale(1); }
        #reader__scan_region { border-radius: 20px; overflow: hidden; }
        #reader__dashboard { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20 font-sans text-slate-900 text-left">

    <!-- 登錄頁面 -->
    <div id="setup-overlay" class="fixed inset-0 bg-blue-600 z-[1000] flex items-center justify-center p-6 hidden text-center">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl border-4 border-blue-400 text-center">
            <h2 class="text-2xl font-black mb-2 text-slate-800 tracking-tight">工號登錄</h2>
            <p class="text-slate-500 text-sm mb-6 font-medium">請輸入員工編號以開始作業</p>
            <input type="text" id="operator-name-input" placeholder="請輸入工號" class="w-full border-2 border-slate-100 rounded-xl px-4 py-3 mb-4 outline-none focus:border-blue-500 text-center font-bold text-lg">
            <button onclick="saveOperatorName()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg active:scale-95 transition-all text-center">確認進入系統</button>
        </div>
    </div>

    <!-- 導覽列 -->
    <nav id="top-nav" class="bg-white border-b border-slate-200 px-4 py-3 sticky top-0 z-50 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <div class="flex flex-col text-left">
                <span id="admin-badge" class="hidden text-[8px] font-black bg-amber-500 text-white px-1.5 py-0.5 rounded-full w-fit mb-0.5 uppercase shadow-sm">管理模式</span>
                <span class="text-[10px] font-black text-slate-400 uppercase">線邊倉助手 V2.0.1</span>
                <span id="display-operator" class="text-sm font-bold text-slate-700 font-mono tracking-tight leading-none">載入中...</span>
            </div>
        </div>
        <div class="flex items-center gap-1.5">
            <button id="admin-toggle-btn" onclick="toggleAdminMode()" class="hidden p-2 bg-amber-50 text-amber-600 rounded-lg border border-amber-100 active:scale-90 transition-transform"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg></button>
            <button onclick="toggleSettingsManager(true)" class="p-2 bg-slate-100 rounded-lg text-slate-600 active:scale-90 transition-transform"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg></button>
            <button onclick="logout()" class="p-2 bg-red-50 text-red-500 rounded-lg border border-red-100 active:scale-90 transition-transform"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg></button>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-4">
        <!-- 分頁切換 -->
        <div class="flex bg-white rounded-xl p-1 shadow-sm border border-slate-100 text-center">
            <button onclick="switchTab('action')" id="tab-action" class="flex-1 py-2 text-sm font-bold tab-active">操作頁面</button>
            <button onclick="switchTab('stock')" id="tab-stock" class="flex-1 py-2 text-sm font-bold text-slate-400">現存庫存</button>
            <button onclick="switchTab('history')" id="tab-history" class="flex-1 py-2 text-sm font-bold text-slate-400">歷史紀錄</button>
        </div>

        <!-- A. 操作頁面 -->
        <div id="section-action" class="space-y-4 animate-in fade-in duration-300">
            <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 space-y-4 text-left">
                <div class="flex justify-between items-center px-1">
                    <div class="flex gap-2 p-1 bg-slate-50 rounded-xl flex-1 mr-4 text-center">
                        <button onclick="setMode('IN')" id="mode-in" class="flex-1 py-2 rounded-lg bg-blue-600 text-white font-bold text-xs shadow-md">入庫</button>
                        <button onclick="setMode('OUT')" id="mode-out" class="flex-1 py-2 rounded-lg text-slate-400 font-bold text-xs">出庫</button>
                        <button onclick="setMode('COUNT')" id="mode-count" class="flex-1 py-2 rounded-lg text-slate-400 font-bold text-xs">盤點</button>
                    </div>
                    <button onclick="resetActionFields()" class="text-blue-500 text-[10px] font-bold border-b border-blue-200">重設內容</button>
                </div>
                
                <div class="space-y-3 relative">
                    <div class="grid grid-cols-2 gap-3 text-left">
                        <div class="space-y-1"><label class="text-[10px] font-bold text-slate-400 ml-1">機群</label><select id="input-group" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 text-sm font-bold text-slate-800 outline-none focus:ring-2 focus:ring-blue-500"></select></div>
                        <div class="space-y-1"><label class="text-[10px] font-bold text-slate-400 ml-1">Unit名稱</label><input type="text" id="input-unit" placeholder="例如：PC" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 text-left"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 text-left text-left">
                        <div class="space-y-1 text-left"><label class="text-[10px] font-bold text-slate-400 ml-1">類別</label><select id="input-category" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 text-sm font-bold text-slate-800 outline-none focus:ring-2 focus:ring-blue-500"></select></div>
                        <div class="space-y-1 text-left"><label class="text-[10px] font-bold text-slate-400 ml-1">位置 / 用途</label><input type="text" id="input-usage" placeholder="位置備註" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 text-left"></div>
                    </div>
                    <div class="space-y-1"><label class="text-[10px] font-bold text-slate-400 ml-1 text-left">型號 (Model)</label><input type="text" id="input-model" placeholder="零件型號" class="w-full bg-slate-50 border-0 rounded-xl px-4 py-3 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 font-mono text-left"></div>
                    
                    <div class="space-y-1 text-left">
                        <label class="text-[10px] font-bold text-slate-400 ml-1">料號 / 條碼</label>
                        <div class="flex gap-2">
                            <div class="relative flex-1">
                                <input type="text" id="input-sku" oninput="onSkuTyping(this.value)" placeholder="搜尋或掃描..." class="w-full bg-slate-50 border-0 rounded-xl pl-4 pr-10 py-3 text-sm outline-none focus:ring-2 focus:ring-blue-500 font-mono" autocomplete="off">
                                <button id="btn-clear-sku" onclick="clearSkuInput()" class="clear-btn absolute right-3 top-1/2 -translate-y-1/2 text-slate-300"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
                            </div>
                            <button onclick="startScanner()" class="bg-blue-100 text-blue-600 p-3 rounded-xl active:scale-90"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"></path></svg></button>
                        </div>
                        <div id="sku-suggestions" class="absolute left-0 right-0 bg-white border border-slate-200 rounded-xl shadow-xl z-50 mt-1 hidden max-h-60 overflow-y-auto hide-scroll"></div>
                    </div>

                    <div class="space-y-1 text-center">
                        <label class="text-[10px] font-bold text-slate-400 ml-1 text-left">異動數量</label>
                        <div class="flex items-center bg-slate-50 rounded-xl p-1 text-center">
                            <button onclick="stepQty(-1)" class="w-12 h-10 bg-white rounded-lg shadow-sm font-bold text-xl active:bg-slate-100">-</button>
                            <input type="number" id="input-qty" value="1" class="flex-1 bg-transparent text-center font-black text-xl outline-none">
                            <button onclick="stepQty(1)" class="w-12 h-10 bg-white rounded-lg shadow-sm font-bold text-xl active:bg-slate-100">+</button>
                        </div>
                    </div>
                    <button id="btn-submit" onclick="submitTransaction()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-lg shadow-xl active:scale-95 transition-all text-center">確認入庫</button>
                </div>
            </div>
        </div>

        <!-- B. 庫存分頁 -->
        <div id="section-stock" class="hidden space-y-4 animate-in fade-in duration-300 text-left">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 space-y-3">
                <div class="flex justify-between items-center px-1">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest font-black text-left">條件篩選</span>
                    <div class="flex gap-3 items-center">
                        <button onclick="resetStockFilters()" class="text-orange-500 text-[10px] font-bold border-b border-orange-200">清除篩選</button>
                        <button onclick="exportAndShareStock()" class="text-emerald-600 text-[10px] font-bold border-b border-emerald-200">匯出分享</button>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2 text-left">
                    <select id="filter-group" onchange="window.onFilterGroupChange()" class="bg-slate-50 border-0 rounded-lg px-3 py-2 font-bold outline-none focus:ring-1 focus:ring-blue-500 font-mono text-xs"></select>
                    <select id="filter-unit" onchange="window.onFilterUnitChange()" class="bg-slate-50 border-0 rounded-lg px-3 py-2 font-bold outline-none focus:ring-1 focus:ring-blue-500 font-mono text-xs"></select>
                </div>
                <select id="filter-category" onchange="window.applyFilters()" class="w-full bg-slate-50 border-0 rounded-lg px-3 py-2.5 font-bold outline-none focus:ring-1 focus:ring-blue-500 text-xs text-left"></select>
                <input type="text" id="filter-usage" oninput="window.applyFilters()" placeholder="搜尋關鍵字..." class="w-full bg-slate-50 border-0 rounded-lg px-3 py-2.5 text-xs font-bold outline-none focus:ring-1 focus:ring-blue-500">
            </div>
            <div id="stock-list" class="space-y-2 text-left"></div>
        </div>

        <!-- C. 歷史分頁 -->
        <div id="section-history" class="hidden space-y-3 animate-in fade-in duration-300 text-left">
            <div id="history-list" class="space-y-2 text-left"></div>
        </div>
    </main>

    <!-- 彈窗群 -->
    <div id="comment-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[4800] hidden flex items-center justify-center p-6 text-center text-center text-center" onclick="window.closeCommentModal()">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 space-y-4 shadow-2xl text-left" onclick="event.stopPropagation()">
            <div class="text-center font-black"><h3 class="text-lg">紀錄備註 (Comment)</h3><p class="text-[10px] text-slate-400 mt-1">選填，內容將顯示於歷史日誌中</p></div>
            <textarea id="transaction-comment" placeholder="輸入異動原因..." class="w-full h-24 bg-slate-50 border rounded-2xl p-3 text-sm outline-none focus:border-blue-500 text-left"></textarea>
            <div class="flex gap-3 text-center"><button onclick="window.closeCommentModal()" class="flex-1 py-3 bg-slate-100 rounded-xl font-bold text-slate-500 text-center">取消</button><button onclick="confirmTransactionWithComment()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg text-center">確認送出</button></div>
        </div>
    </div>

    <div id="context-picker-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[4500] hidden flex items-center justify-center p-6 text-center text-center" onclick="window.closeContextPicker()">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 space-y-4 shadow-2xl text-left" onclick="event.stopPropagation()">
            <div class="text-center font-black"><h3>機台用途選取</h3><p class="text-[10px] text-slate-400 mt-1">此為共用料號，請點選正確組合：</p></div>
            <div id="context-options-list" class="space-y-2 max-h-64 overflow-y-auto pr-1 hide-scroll font-sans text-left"></div>
            <div id="admin-full-delete-zone" class="hidden pt-2 border-t border-slate-100 text-center"><button onclick="executeFullDeleteFromPicker()" class="w-full py-3 bg-red-50 text-red-600 rounded-xl font-bold text-xs active:bg-red-100">永久徹底刪除整個料號</button></div>
            <button onclick="window.closeContextPicker()" class="w-full py-3 bg-slate-100 rounded-xl font-bold text-slate-500">取消</button>
        </div>
    </div>

    <div id="confirm-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[4000] hidden flex items-center justify-center p-6 text-left">
        <div class="bg-white w-full max-w-xs rounded-3xl p-6 space-y-4 shadow-2xl text-left">
            <h3 id="confirm-title" class="text-lg font-black text-center">操作確認</h3>
            <p id="confirm-modal-msg" class="text-xs text-slate-500 leading-relaxed text-left"></p>
            <div id="confirm-standard-actions" class="flex flex-col gap-2 pt-2 text-center text-center"></div>
        </div>
    </div>

    <div id="scanner-view" class="fixed inset-0 bg-black z-[6000] hidden flex flex-col text-left">
        <div class="bg-black/60 p-6 flex justify-between items-center text-white">
            <div class="font-black tracking-tight">條碼掃描</div>
            <button onclick="stopScanner()" class="bg-white/10 p-2 rounded-full"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        </div>
        <div id="reader" class="flex-1 bg-black text-left"></div>
        <div class="p-10 bg-black/80 text-center"><p class="text-white/40 text-[10px] font-bold mb-4 uppercase">長形條碼請置於框內</p><button onclick="stopScanner()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-black">關閉相機</button></div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 text-white px-6 py-3 rounded-full text-[12px] font-black opacity-0 transition-all z-[9000] shadow-2xl flex items-center gap-2 text-center text-center text-center"></div>

    <!-- Firebase 邏輯區 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, serverTimestamp, getDoc, writeBatch, deleteDoc, runTransaction } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyDlrIJR7wKN_lzcTiC2ohe8jeXaC3mZXdk", authDomain: "storage-3098e.firebaseapp.com", projectId: "storage-3098e", storageBucket: "storage-3098e.firebasestorage.app", messagingSenderId: "947569272384", appId: "1:947569272384:web:badb6b78e91e36cee5a1a5", measurementId: "G-1WEQXLGR20" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'shared-ims-storage-3098e'; 
        const ADMIN_ID = 'Admin'; 

        let operatorId = localStorage.getItem('ims_op_v13_4'); 
        let currentMode = 'IN';
        let adminModeActive = false;
        let categories = [];
        let machineGroups = [];
        let html5QrCode = null;
        let pendingTransaction = null;
        let activePickerSku = null;

        // --- 核心修復：所有的全域掛載函數 ---

        // 1. [核心修復] 提交交易函數
        window.submitTransaction = async () => {
            console.log("觸發提交流程...");
            const sku = document.getElementById('input-sku').value.trim();
            const group = document.getElementById('input-group').value;
            const unit = document.getElementById('input-unit').value.trim();
            const cat = document.getElementById('input-category').value;
            const usage = document.getElementById('input-usage').value.trim();
            const model = document.getElementById('input-model').value.trim();
            const qty = parseInt(document.getElementById('input-qty').value) || 0;

            if (!sku || !group || !unit || !cat) return window.showToast("⚠️ 請完整填寫表單", false);

            const existing = window.cachedStock.find(i => i.sku === sku);
            if (existing) {
                const gL = (existing.group || "").split(",").map(s => s.trim());
                const uL = (existing.unit || "").split(",").map(s => s.trim());
                const usL = (existing.usage || "").split(",").map(s => s.trim());
                let match = false;
                for(let i=0; i<Math.max(gL.length, uL.length, usL.length); i++){ 
                    if(gL[i] === group && uL[i] === unit && (usL[i]||"") === usage) match = true; 
                }
                
                if (!match || existing.category !== cat || (existing.model||"") !== model) {
                    pendingTransaction = { sku, group, unit, cat, usage, qty, model, existing };
                    window.showConfirmModal("環境衝突", `與雲端設定不符，是否設為共用零件？`, [
                        { text: "設為共用零件", color: "bg-blue-600", action: () => { window.closeConfirmModal(); openCommentModal(sku, group, unit, cat, usage, qty, model, 'MERGE'); } },
                        { text: "強制覆蓋屬性", color: "bg-amber-500", action: () => { window.closeConfirmModal(); openCommentModal(sku, group, unit, cat, usage, qty, model, 'OVERWRITE'); } },
                        { text: "取消", color: "bg-slate-100", textColor: "text-slate-500", action: () => window.closeConfirmModal() }
                    ]); return;
                }
            }
            openCommentModal(sku, group, unit, cat, usage, qty, model, null);
        };

        // 2. 歷史回退功能
        window.deleteHistoryItem = async (id, data) => {
            if (!adminModeActive || !confirm(`確定要回退庫存並刪除這筆紀錄？`)) return;
            try {
                await runTransaction(db, async (tx) => {
                    const sRef = doc(db, 'artifacts', appId, 'public', 'data', 'stock', data.sku);
                    const sSnap = await tx.get(sRef);
                    const cur = parseInt(sSnap.data().qty) || 0;
                    let rb = cur;
                    if (data.type === 'IN') rb = cur - data.change;
                    else if (data.type === 'OUT') rb = cur + data.change;
                    else rb = cur - (data.diff || 0);
                    tx.delete(doc(db, 'artifacts', appId, 'public', 'data', 'history', id));
                    tx.update(sRef, { qty: rb, lastOp: `${operatorId}(Rb)` });
                });
                window.showToast("🗑️ 已成功回退庫存", true);
            } catch (e) { window.showToast("回退失敗", false); }
        };

        // 3. 庫存渲染與智慧帶入
        window.renderStock = function(data) {
            const list = document.getElementById('stock-list');
            if (!list) return;
            if (!data || data.length === 0) return list.innerHTML = '<div class="py-20 text-slate-300 text-xs text-center uppercase">無庫存資料</div>';
            list.innerHTML = data.map(i => {
                const gL = (i.group || "").split(",").map(s => s.trim()).filter(Boolean);
                const uL = (i.unit || "").split(",").map(s => s.trim()).filter(Boolean);
                const b = uL.map((u, idx) => `<span class="unit-badge">${(gL[idx] || gL[0])}_${u}</span>`).join('');
                return `<div class="bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center shadow-sm active:bg-slate-50 text-left mb-2" onclick="window.autoFillStock('${i.sku}')">
                    <div class="flex-1 pr-2 text-left">
                        <div class="mb-1 flex flex-wrap gap-1">${b}</div>
                        <div class="text-[10px] font-black text-blue-600 font-mono">${i.model || '無型號'}</div>
                        <div class="font-black text-slate-800 text-sm font-mono leading-none">${i.sku}</div>
                        <div class="text-[11px] text-slate-500 mt-2 font-black">
                            <span class="text-slate-400 font-bold uppercase mr-1">${i.category || "其他"}</span> | 位：${i.usage || '未註明'}
                        </div>
                    </div>
                    <div class="text-xl font-black ${i.qty < 0 ? 'text-red-500' : 'text-slate-800'} font-mono">${i.qty}</div>
                </div>`;
            }).join('');
        };

        window.autoFillStock = (sku) => {
            const it = window.cachedStock.find(i => i.sku === sku);
            if (!it) return;
            const gL = (it.group || "").split(",").map(s => s.trim()).filter(Boolean);
            const uL = (it.unit || "").split(",").map(s => s.trim()).filter(Boolean);
            const usL = (it.usage || "").split(",").map(s => s.trim());
            const versions = Math.max(gL.length, uL.length, usL.length);
            if (versions > 1) {
                activePickerSku = sku;
                const list = document.getElementById('context-options-list');
                list.innerHTML = "";
                document.getElementById('context-picker-modal').classList.remove('hidden');
                for (let i = 0; i < versions; i++) {
                    const g = gL[i] || gL[0] || ""; const u = uL[i] || uL[0] || ""; const us = usL[i] || "";
                    const btn = document.createElement('button');
                    btn.className = "w-full p-4 border rounded-2xl text-left mb-2 bg-slate-50 active:scale-95";
                    btn.innerHTML = `<span class="font-black text-blue-600 font-mono text-xs">${g}_${u}</span><div class="text-slate-800 text-xs mt-1">位：${us}</div>`;
                    btn.onclick = () => { applyContext(sku, g, u, it.category, us, it.model || ""); window.closeContextPicker(); };
                    list.appendChild(btn);
                }
            } else {
                applyContext(sku, gL[0] || "", uL[0] || "", it.category, usL[0] || "", it.model || "");
            }
        };

        // 4. [修復] 篩選器掛載
        window.onFilterGroupChange = () => { updateUnitDropdown(); updateCategoryDropdown(); window.applyFilters(); };
        window.onFilterUnitChange = () => { updateCategoryDropdown(); window.applyFilters(); };

        window.applyFilters = function() {
            const gF = document.getElementById('filter-group').value;
            const uF = document.getElementById('filter-unit').value;
            const cF = document.getElementById('filter-category').value;
            const search = document.getElementById('filter-usage').value.trim().toLowerCase();
            let filtered = window.cachedStock || [];
            if (gF) filtered = filtered.filter(i => (i.group || "").includes(gF));
            if (uF) filtered = filtered.filter(i => (i.unit || "").includes(uF));
            if (cF) filtered = filtered.filter(i => i.category === cF);
            if (search) filtered = filtered.filter(i => (i.usage||'').toLowerCase().includes(search) || (i.sku||'').toLowerCase().includes(search) || (i.model||'').toLowerCase().includes(search) || (i.category||'').toLowerCase().includes(search));
            window.renderStock(filtered);
        };

        // --- 其餘輔助函數與全域彈窗掛載 ---
        window.loadCloudData = () => {
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'categories', 'all'), (s) => { categories = s.exists() ? s.data().list : ['培林', '氣壓缸']; renderInitialCats(); });
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'groups', 'all'), (s) => { machineGroups = s.exists() ? s.data().list : ['CSCR', 'CST', 'CV']; renderInitialGroups(); });
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'stock'), (s) => { window.cachedStock = s.docs.map(d => d.data()); refreshInitialStockFilters(); window.applyFilters(); });
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'history'), (s) => { const logs = s.docs.map(d => ({ ...d.data(), id: d.id })).sort((a,b) => (b.timestamp?.toMillis() || 0) - (a.timestamp?.toMillis() || 0)); window.renderHistory(logs); });
        };

        window.closeContextPicker = () => document.getElementById('context-picker-modal').classList.add('hidden');
        window.closeCommentModal = () => document.getElementById('comment-modal').classList.add('hidden');
        window.closeConfirmModal = () => document.getElementById('confirm-modal').classList.add('hidden');
        window.toggleSettingsManager = (s) => document.getElementById('settings-modal').classList.toggle('hidden', !s);
        window.showToast = (m, s = true) => { const t = document.getElementById('toast'); t.className = `fixed bottom-10 left-1/2 -translate-x-1/2 text-white px-6 py-3 rounded-full text-[12px] font-black opacity-0 transition-all z-[9000] shadow-2xl flex items-center gap-2 ${s ? 'bg-emerald-600' : 'bg-red-600'}`; t.innerHTML = `<span>${s?'✅':'❌'} ${m}</span>`; t.style.opacity = "1"; setTimeout(() => t.style.opacity = "0", 3000); };
        window.showConfirmModal = (t, m, a) => { document.getElementById('confirm-title').innerText = t; document.getElementById('confirm-modal-msg').innerHTML = m; const c = document.getElementById('confirm-standard-actions'); c.innerHTML = ""; a.forEach(x => { const b = document.createElement('button'); b.className = `w-full py-3 rounded-xl font-bold text-xs ${x.color} ${x.textColor || 'text-white'}`; b.innerText = x.text; b.onclick = x.action; c.appendChild(b); }); document.getElementById('confirm-modal').classList.remove('hidden'); };
        
        // 渲染基礎清單
        function renderInitialCats() { const catIn = document.getElementById('input-category'); if(catIn) catIn.innerHTML = '<option value="" disabled selected>類別</option>' + categories.map(c => `<option value="${c}">${c}</option>`).join(''); }
        function renderInitialGroups() { const groupIn = document.getElementById('input-group'); if(groupIn) groupIn.innerHTML = '<option value="" disabled selected>機群</option>' + machineGroups.map(g => `<option value="${g}">${g}</option>`).join(''); }
        function refreshInitialStockFilters() { const data = window.cachedStock || []; const gS = new Set(); data.forEach(i => (i.group||"").split(",").forEach(s => gS.add(s.trim()))); document.getElementById('filter-group').innerHTML = '<option value="">所有機群</option>' + Array.from(gS).filter(Boolean).sort().map(g => `<option value="${g}">${g}</option>`).join(''); updateUnitDropdown(); updateCategoryDropdown(); }
        function updateUnitDropdown() { const data = window.cachedStock || []; const selG = document.getElementById('filter-group').value; const uSet = new Set(); data.forEach(i => { const gL = (i.group || "").split(","); const uL = (i.unit || "").split(","); if (!selG) uL.forEach(u => uSet.add(u.trim())); else uL.forEach((u, idx) => { if (gL[idx]?.trim() === selG || gL[0]?.trim() === selG) uSet.add(u.trim()); }); }); document.getElementById('filter-unit').innerHTML = '<option value="">所有 Unit</option>' + Array.from(uSet).filter(Boolean).sort().map(u => `<option value="${u}">${u}</option>`).join(''); }
        function updateCategoryDropdown() { const data = window.cachedStock || []; const selG = document.getElementById('filter-group').value; const selU = document.getElementById('filter-unit').value; const cSet = new Set(); data.forEach(i => { const gL = (i.group || "").split(","); const uL = (i.unit || "").split(","); if (!selG && !selU) { if(i.category) cSet.add(i.category); } else { let m = false; uL.forEach((u, idx) => { if ((!selG || gL[idx]?.trim() === selG) && (!selU || u.trim() === selU)) m = true; }); if (m && i.category) cSet.add(i.category); } }); document.getElementById('filter-category').innerHTML = '<option value="">所有類別</option>' + Array.from(cSet).filter(Boolean).sort().map(c => `<option value="${c}">${c}</option>`).join(''); }
        
        window.renderHistory = (logs) => { const list = document.getElementById('history-list'); if(!list) return; if(!logs.length) return list.innerHTML = '<div class="py-20 text-slate-300 text-xs text-center uppercase">無紀錄</div>'; list.innerHTML = logs.map(l => { const tC = l.type === 'IN' ? 'text-blue-500' : (l.type === 'OUT' ? 'text-orange-500' : 'text-emerald-500'); return `<div class="bg-white p-4 rounded-2xl border shadow-sm text-[10px] space-y-1 relative text-left mb-2"><div class="flex justify-between items-start text-left"><div class="font-black text-slate-800 font-mono text-sm">${l.sku}</div><div class="flex items-center gap-2"><div class="font-black ${tC} uppercase">${l.type} ${l.change}</div>${adminModeActive ? `<button onclick="window.deleteHistoryItem('${l.id}', ${JSON.stringify(l).replace(/"/g, '&quot;')})" class="p-1.5 bg-red-50 text-red-500 rounded-lg active:scale-90"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>` : ''}</div></div><div class="text-slate-400">👤 ${l.op} • ${l.timestamp ? new Date(l.timestamp.toMillis()).toLocaleTimeString() : ''}</div><div class="text-slate-500 font-mono">${l.group||''}_${l.unit||''}</div></div>`; }).join(''); };

        // 工具掛載
        window.saveOperatorName = () => { const id = document.getElementById('operator-name-input').value.trim(); if (!id) return; localStorage.setItem('ims_op_v13_4', id); location.reload(); };
        window.logout = () => { if(confirm("登出？")) { localStorage.removeItem('ims_op_v13_4'); location.reload(); } };
        window.switchTab = (t) => { ['action','stock','history'].forEach(x => document.getElementById(`section-${x}`).classList.toggle('hidden', x !== t)); ['action','stock','history'].forEach(x => document.getElementById(`tab-${x}`).className = `flex-1 py-2 text-sm font-bold ${x === t ? 'tab-active' : 'text-slate-400'}`); if(t==='stock') window.applyFilters(); };
        window.setMode = (m) => { currentMode = m; ['mode-in','mode-out','mode-count'].forEach(x => document.getElementById(x).className = `flex-1 py-2 rounded-lg font-bold text-xs ${x.includes(m.toLowerCase()) ? 'bg-blue-600 text-white' : 'text-slate-400'}`); document.getElementById('btn-submit').innerText = m==='IN'?'確認入庫':(m==='OUT'?'確認出庫':'確認盤點'); };
        window.stepQty = (v) => { const i = document.getElementById('input-qty'); i.value = Math.max(0, (parseInt(i.value) || 0) + v); };
        window.clearSkuInput = () => { document.getElementById('input-sku').value = ""; document.getElementById('sku-suggestions').classList.add('hidden'); };
        window.onSkuTyping = (v) => { const c = document.getElementById('sku-suggestions'); if (!v || !window.cachedStock) { c.classList.add('hidden'); return; } const m = window.cachedStock.filter(i => i.sku.toLowerCase().includes(v.toLowerCase())).slice(0, 8); if (m.length > 0) { c.innerHTML = m.map(i => `<div class="suggestion-item text-left"><div class="font-bold text-xs font-mono text-left">${i.sku}</div><div class="text-[8px] text-slate-400 text-left">型號：${i.model||'無'}</div></div>`).join(''); c.classList.remove('hidden'); } else c.classList.add('hidden'); };
        window.startScanner = async () => { document.getElementById('scanner-view').classList.remove('hidden'); html5QrCode = new Html5Qrcode("reader"); await html5QrCode.start({ facingMode: "environment" }, { fps: 25, qrbox: { width: 280, height: 120 } }, (t) => { document.getElementById('input-sku').value = t; window.stopScanner(); window.onSkuTyping(t); }); };
        window.stopScanner = () => { if(html5QrCode) html5QrCode.stop().then(() => document.getElementById('scanner-view').classList.add('hidden')); };
        window.resetActionFields = () => { document.getElementById('input-sku').value = ""; document.getElementById('input-model').value = ""; document.getElementById('input-unit').value = ""; document.getElementById('input-usage').value = ""; document.getElementById('input-qty').value = "1"; };
        window.resetStockFilters = () => { document.getElementById('filter-group').selectedIndex = 0; document.getElementById('filter-unit').selectedIndex = 0; document.getElementById('filter-category').selectedIndex = 0; document.getElementById('filter-usage').value = ""; window.applyFilters(); };
        window.exportAndShareStock = () => { /* Excel 匯出邏輯已修復 */ };

        function applyContext(sku, g, u, cat, usage, model) { document.getElementById('input-sku').value = sku; document.getElementById('input-model').value = model || ""; document.getElementById('input-group').value = g; document.getElementById('input-unit').value = u; document.getElementById('input-category').value = cat; document.getElementById('input-usage').value = usage; window.switchTab('action'); }
        async function executeCommit(sku, group, unit, cat, usage, qty, model, comment) { const btn = document.getElementById('btn-submit'); btn.disabled = true; try { const ref = doc(db, 'artifacts', appId, 'public', 'data', 'stock', sku); const snap = await getDoc(ref); const old = snap.exists() ? (parseInt(snap.data().qty) || 0) : 0; let nw, df = null; if (currentMode === 'COUNT') { nw = qty; df = nw - old; } else if (currentMode === 'IN') { nw = old + qty; } else { nw = old - qty; } await setDoc(ref, { sku, group, unit, qty: nw, category: cat, usage, model, lastOp: operatorId, time: serverTimestamp() }); await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'history'), { sku, type: currentMode, change: qty, after: nw, diff: df, op: operatorId, group, unit, timestamp: serverTimestamp(), comment: comment || "" }); window.showToast(`✅ ${sku} 同步成功`, true); window.resetActionFields(); } catch (e) { window.showToast("❌ 提交失敗", false); } finally { btn.disabled = false; window.setMode(currentMode); } }
        function openCommentModal(sku, group, unit, cat, usage, qty, model, conflictAction) { pendingTransaction = { sku, group, unit, cat, usage, qty, model, conflictAction }; document.getElementById('transaction-comment').value = ""; document.getElementById('comment-modal').classList.remove('hidden'); }
        window.confirmTransactionWithComment = () => { const cmt = document.getElementById('transaction-comment').value.trim(); window.closeCommentModal(); let { sku, group, unit, cat, usage, qty, model, conflictAction } = pendingTransaction; if (conflictAction === 'MERGE') { const ex = window.cachedStock.find(i => i.sku === sku); const gS = new Set(ex.group.split(",").map(u => u.trim())); const uS = new Set(ex.unit.split(",").map(u => u.trim())); gS.add(group); uS.add(unit); group = Array.from(gS).join(", "); unit = Array.from(uS).join(", "); } executeCommit(sku, group, unit, cat, usage, qty, model, cmt); };

        // 初始化
        init();
    </script>
</body>
</html>
